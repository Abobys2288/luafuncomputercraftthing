<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCOS NFP Converter</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #121312;
    --bar: #191a18;
    --panel: #20211f;
    --panel-2: #272822;
    --field: #111210;
    --line: #45483e;
    --text: #eeeeec;
    --muted: #abae9f;
    --soft: #777b6f;
    --accent: #2fa89f;
    --accent-2: #d99731;
    --danger: #d7514a;
    --good: #81b86c;
    --focus: rgba(47, 168, 159, .35);
    --mono: "Cascadia Mono", "Consolas", monospace;
    --ui: Inter, "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.35 var(--ui);
  }

  button, input, textarea {
    font: inherit;
    color: inherit;
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 36px;
    padding: 7px 11px;
    border: 1px solid #55584f;
    border-radius: 7px;
    background: #2b2d28;
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease, transform .12s ease;
  }

  button:hover {
    border-color: var(--accent);
    background: #30342f;
  }

  button:active { transform: translateY(1px); }

  button:disabled {
    cursor: not-allowed;
    opacity: .45;
  }

  button.primary {
    border-color: #42bdb3;
    background: #176961;
  }

  button.warning {
    border-color: #d9a34a;
    background: #704f18;
  }

  svg {
    width: 16px;
    height: 16px;
    flex: 0 0 auto;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bar);
  }

  h1 {
    margin: 0;
    font-size: 18px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: 0;
  }

  .status {
    min-width: 0;
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status.good { color: var(--good); }
  .status.bad { color: var(--danger); }

  main {
    display: grid;
    grid-template-columns: minmax(290px, 380px) minmax(420px, 1fr) minmax(320px, 480px);
    min-height: calc(100vh - 56px);
  }

  section {
    min-width: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
  }

  section:last-child { border-right: 0; }

  .section-head {
    display: flex;
    align-items: center;
    min-height: 44px;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-2);
  }

  .section-head strong {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .body {
    display: grid;
    gap: 12px;
    padding: 12px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .full { grid-column: 1 / -1; }

  .field {
    display: grid;
    gap: 5px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .field-label {
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .field-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .field-hint {
    color: var(--soft);
    font-size: 11px;
    white-space: nowrap;
  }

  input[type="number"],
  input[type="text"] {
    width: 100%;
    min-height: 36px;
    padding: 7px 9px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--field);
    outline: none;
  }

  input[type="number"]:focus,
  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus);
  }

  #sourceFile { display: none; }

  .file-picker {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 8px;
    align-items: stretch;
    min-height: 44px;
    padding: 6px;
    border: 1px dashed #5b5f55;
    border-radius: 8px;
    background: #12140f;
  }

  .file-picker:hover {
    border-color: var(--accent);
    background: #151914;
  }

  .file-picker:focus-within,
  .file-picker.drag {
    border-color: var(--accent);
    background: #151914;
    box-shadow: 0 0 0 3px var(--focus);
  }

  .file-picker.drag {
    border-style: solid;
  }

  .file-picker button {
    min-width: 112px;
    align-self: stretch;
  }

  .file-name {
    display: grid;
    align-content: center;
    min-width: 0;
    padding: 0 8px;
    color: var(--text);
    font-size: 13px;
    overflow: hidden;
  }

  .file-name strong,
  .file-name span {
    display: block;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-name span {
    margin-top: 2px;
    color: var(--muted);
    font-size: 11px;
  }

  .segment {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .segment.output {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .segment input,
  .switch input {
    position: absolute;
    inline-size: 1px;
    block-size: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .segment span {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    padding: 7px 8px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--field);
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    user-select: none;
  }

  .segment input:checked + span {
    border-color: var(--accent);
    background: #163c39;
    color: var(--text);
  }

  .segment input:focus-visible + span,
  .switch input:focus-visible + span {
    box-shadow: 0 0 0 3px var(--focus);
  }

  .switches {
    display: grid;
    gap: 8px;
  }

  .switch {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 36px;
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--field);
    color: var(--muted);
    font-size: 13px;
  }

  .switch.disabled {
    opacity: .45;
  }

  .switch span:last-child {
    position: relative;
    width: 38px;
    height: 22px;
    border-radius: 999px;
    background: #4b4e45;
    flex: 0 0 auto;
  }

  .switch span:last-child::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #d7d8d1;
    transition: transform .14s ease, background .14s ease;
  }

  .switch input:checked + span + span {
    background: #1f7d74;
  }

  .switch input:checked + span + span::after {
    transform: translateX(16px);
    background: white;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hidden {
    display: none !important;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .metric {
    min-width: 0;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--field);
  }

  .metric b {
    display: block;
    color: var(--text);
    font-size: 16px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .metric span {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .preview-wrap {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    background: #151613;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    min-height: 0;
    background: var(--line);
  }

  .preview-pane {
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
    min-height: 0;
    background: var(--panel);
  }

  .preview-title {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 38px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .canvas-stage {
    display: grid;
    place-items: center;
    min-height: 260px;
    padding: 14px;
    overflow: auto;
    background:
      linear-gradient(45deg, #171813 25%, transparent 25%),
      linear-gradient(-45deg, #171813 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #171813 75%),
      linear-gradient(-45deg, transparent 75%, #171813 75%),
      #10110f;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    background-size: 16px 16px;
  }

  canvas {
    max-width: 100%;
    height: auto;
    border: 1px solid #5b5e54;
    background: black;
    image-rendering: pixelated;
  }

  .empty-canvas {
    color: var(--soft);
    text-align: center;
    font-size: 13px;
  }

  .palette-strip {
    display: grid;
    gap: 2px;
    padding: 10px 12px;
    border-top: 1px solid var(--line);
    background: var(--panel);
  }

  .swatches {
    display: grid;
    grid-template-columns: repeat(32, minmax(5px, 1fr));
    gap: 2px;
  }

  .swatches.mode-256 {
    grid-template-columns: repeat(32, minmax(4px, 1fr));
  }

  .swatch {
    aspect-ratio: 1;
    min-height: 8px;
    border: 1px solid rgba(255, 255, 255, .08);
  }

  .output-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    background: var(--panel);
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 280px;
    padding: 12px;
    border: 0;
    border-radius: 0;
    background: #10110f;
    color: #e8e9df;
    outline: none;
    resize: none;
    font: 12px/1.35 var(--mono);
    white-space: pre;
    tab-size: 2;
  }

  .inline-note {
    color: var(--muted);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  @media (max-width: 1120px) {
    main {
      grid-template-columns: 360px minmax(360px, 1fr);
    }

    .output-panel {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
    }
  }

  @media (max-width: 760px) {
    header {
      align-items: flex-start;
      flex-direction: column;
      gap: 6px;
    }

    .status { margin-left: 0; width: 100%; }

    main {
      display: block;
      min-height: auto;
    }

    section {
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }

    .preview-grid,
    .form-grid {
      grid-template-columns: 1fr;
    }

    .segment.output {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .canvas-stage {
      min-height: 210px;
    }

    textarea {
      min-height: 340px;
    }
  }
</style>
</head>
<body>
<header>
  <h1>CCOS NFP Converter</h1>
  <div id="status" class="status" aria-live="polite">Ready</div>
</header>

<main>
  <section>
    <div class="section-head">
      <strong>Convert</strong>
    </div>
    <div class="body">
      <div class="field full">
        <div class="field-label">Source image or video</div>
        <div id="fileDropZone" class="file-picker">
          <button id="filePickButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"/><path d="M12 4v12"/><path d="m7 9 5-5 5 5"/></svg>
            Choose
          </button>
          <div class="file-name">
            <strong id="fileName">No source selected</strong>
            <span id="fileMeta">PNG, JPG, GIF, MP4, WebM</span>
          </div>
          <input id="sourceFile" type="file" accept="image/*,video/*">
        </div>
      </div>

      <div class="form-grid">
        <label class="field">
          <span class="field-top"><span>Width</span><span id="widthLimit" class="field-hint">max 512</span></span>
          <input id="widthInput" type="number" min="1" max="512" step="1" value="128">
        </label>
        <label class="field">
          <span class="field-top"><span>Height</span><span id="heightLimit" class="field-hint">max 512</span></span>
          <input id="heightInput" type="number" min="1" max="512" step="1" value="96">
        </label>
      </div>

      <div class="field full" role="group" aria-labelledby="outputLabel">
        <div id="outputLabel" class="field-label">Output</div>
        <div class="segment output" id="formatGroup">
          <label><input type="radio" name="format" value="nfp32" checked><span>.nfp</span></label>
          <label><input type="radio" name="format" value="nfp256"><span>.nfp256</span></label>
          <label><input type="radio" name="format" value="nfpc32"><span>.nfpc 32</span></label>
          <label><input type="radio" name="format" value="nfpc256"><span>.nfpc 256</span></label>
          <label><input type="radio" name="format" value="nfpa32"><span>.nfpa 32</span></label>
          <label><input type="radio" name="format" value="nfpa256"><span>.nfpa 256</span></label>
        </div>
      </div>

      <div id="animationOptions" class="form-grid hidden">
        <label class="field">FPS
          <input id="fpsInput" type="number" min="1" max="60" step="1" value="10">
        </label>
        <label class="field">Loop
          <input id="loopInput" type="number" min="0" max="65535" step="1" value="0">
        </label>
        <label class="field full">Max seconds for GIF/video
          <input id="durationInput" type="number" min="0" max="3600" step="0.1" value="0">
        </label>
      </div>

      <div class="switches">
        <label class="switch">
          <input id="ditherInput" type="checkbox">
          <span>Floyd-Steinberg dither</span>
          <span aria-hidden="true"></span>
        </label>
        <label id="compactSwitch" class="switch">
          <input id="compactInput" type="checkbox" checked>
          <span>Best compression</span>
          <span aria-hidden="true"></span>
        </label>
        <label class="switch">
          <input id="ratioInput" type="checkbox" checked>
          <span>Lock image ratio</span>
          <span aria-hidden="true"></span>
        </label>
      </div>

      <div class="actions">
        <button id="fitButton" title="Fit inside 128 by 96">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5"/><path d="M20 9V4h-5"/><path d="M4 15v5h5"/><path d="M20 15v5h-5"/></svg>
          Fit
        </button>
        <button id="convertButton" class="primary">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v4"/><path d="M12 17v4"/><path d="m4.9 4.9 2.8 2.8"/><path d="m16.3 16.3 2.8 2.8"/><path d="M3 12h4"/><path d="M17 12h4"/><path d="m4.9 19.1 2.8-2.8"/><path d="m16.3 7.7 2.8-2.8"/></svg>
          Convert
        </button>
        <button id="copyButton" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button id="downloadButton" class="warning" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          Download
        </button>
      </div>

      <div class="meta-grid">
        <div class="metric"><b id="metricSize">-</b><span>Image</span></div>
        <div class="metric"><b id="metricMode">32</b><span>Palette</span></div>
        <div class="metric"><b id="metricBytes">0 B</b><span>Output</span></div>
        <div class="metric"><b id="metricRatio">-</b><span>RLE</span></div>
      </div>
    </div>
  </section>

  <section class="preview-wrap">
    <div class="section-head">
      <strong>Preview</strong>
      <span id="previewNote" class="inline-note"></span>
    </div>
    <div class="preview-grid">
      <div class="preview-pane">
        <div class="preview-title">Source</div>
        <div class="canvas-stage">
          <canvas id="sourceCanvas" hidden></canvas>
          <div id="sourceEmpty" class="empty-canvas">No image</div>
        </div>
      </div>
      <div class="preview-pane">
        <div class="preview-title">NFP</div>
        <div class="canvas-stage">
          <canvas id="resultCanvas" hidden></canvas>
          <div id="resultEmpty" class="empty-canvas">No output</div>
        </div>
      </div>
    </div>
    <div class="palette-strip">
      <div class="inline-note" id="paletteName">32-color palette</div>
      <div id="swatches" class="swatches"></div>
    </div>
  </section>

  <section class="output-panel">
    <div class="section-head">
      <strong>Text Output</strong>
      <span id="outputName" class="inline-note"></span>
    </div>
    <textarea id="outputText" spellcheck="false"></textarea>
  </section>
</main>

<script>

// omggif is a JavaScript implementation of a GIF 89a encoder and decoder,
// including animation and compression.  It does not rely on any specific
// underlying system, so should run in the browser, Node, or Plask.

"use strict";

function GifWriter(buf, width, height, gopts) {
  var p = 0;

  var gopts = gopts === undefined ? { } : gopts;
  var loop_count = gopts.loop === undefined ? null : gopts.loop;
  var global_palette = gopts.palette === undefined ? null : gopts.palette;

  if (width <= 0 || height <= 0 || width > 65535 || height > 65535)
    throw new Error("Width/Height invalid.");

  function check_palette_and_num_colors(palette) {
    var num_colors = palette.length;
    if (num_colors < 2 || num_colors > 256 ||  num_colors & (num_colors-1)) {
      throw new Error(
          "Invalid code/color length, must be power of 2 and 2 .. 256.");
    }
    return num_colors;
  }

  // - Header.
  buf[p++] = 0x47; buf[p++] = 0x49; buf[p++] = 0x46;  // GIF
  buf[p++] = 0x38; buf[p++] = 0x39; buf[p++] = 0x61;  // 89a

  // Handling of Global Color Table (palette) and background index.
  var gp_num_colors_pow2 = 0;
  var background = 0;
  if (global_palette !== null) {
    var gp_num_colors = check_palette_and_num_colors(global_palette);
    while (gp_num_colors >>= 1) ++gp_num_colors_pow2;
    gp_num_colors = 1 << gp_num_colors_pow2;
    --gp_num_colors_pow2;
    if (gopts.background !== undefined) {
      background = gopts.background;
      if (background >= gp_num_colors)
        throw new Error("Background index out of range.");
      // The GIF spec states that a background index of 0 should be ignored, so
      // this is probably a mistake and you really want to set it to another
      // slot in the palette.  But actually in the end most browsers, etc end
      // up ignoring this almost completely (including for dispose background).
      if (background === 0)
        throw new Error("Background index explicitly passed as 0.");
    }
  }

  // - Logical Screen Descriptor.
  // NOTE(deanm): w/h apparently ignored by implementations, but set anyway.
  buf[p++] = width & 0xff; buf[p++] = width >> 8 & 0xff;
  buf[p++] = height & 0xff; buf[p++] = height >> 8 & 0xff;
  // NOTE: Indicates 0-bpp original color resolution (unused?).
  buf[p++] = (global_palette !== null ? 0x80 : 0) |  // Global Color Table Flag.
             gp_num_colors_pow2;  // NOTE: No sort flag (unused?).
  buf[p++] = background;  // Background Color Index.
  buf[p++] = 0;  // Pixel aspect ratio (unused?).

  // - Global Color Table
  if (global_palette !== null) {
    for (var i = 0, il = global_palette.length; i < il; ++i) {
      var rgb = global_palette[i];
      buf[p++] = rgb >> 16 & 0xff;
      buf[p++] = rgb >> 8 & 0xff;
      buf[p++] = rgb & 0xff;
    }
  }

  if (loop_count !== null) {  // Netscape block for looping.
    if (loop_count < 0 || loop_count > 65535)
      throw new Error("Loop count invalid.");
    // Extension code, label, and length.
    buf[p++] = 0x21; buf[p++] = 0xff; buf[p++] = 0x0b;
    // NETSCAPE2.0
    buf[p++] = 0x4e; buf[p++] = 0x45; buf[p++] = 0x54; buf[p++] = 0x53;
    buf[p++] = 0x43; buf[p++] = 0x41; buf[p++] = 0x50; buf[p++] = 0x45;

      prev_code = null;

    }

    // We have a similar situation as the decoder, where we want to store
    // variable length entries (code table entries), but we want to do in a
    // faster manner than an array of arrays.  The code below stores sort of a
    // linked list within the code table, and then "chases" through it to
    // construct the dictionary entries.  When a new entry is created, just the
    // last byte is stored, and the rest (prefix) of the entry is only
    // referenced by its table entry.  Then the code chases through the
    // prefixes until it reaches a single byte code.  We have to chase twice,
    // first to compute the length, and then to actually copy the data to the
    // output (backwards, since we know the length).  The alternative would be
    // storing something in an intermediate stack, but that doesn't make any
    // more sense.  I implemented an approach where it also stored the length
    // in the code table, although it's a bit tricky because you run out of
    // bits (12 + 12 + 8), but I didn't measure much improvements (the table
    // entries are generally not the long).  Even when I created benchmarks for
    // very long table entries the complexity did not seem worth it.
    // The code table stores the prefix entry in 12 bits and then the suffix
    // byte in 8 bits, so each entry is 20 bits.

    var chase_code = code < next_code ? code : prev_code;

    // Chase what we will output, either {CODE} or {CODE-1}.
    var chase_length = 0;
    var chase = chase_code;
    while (chase > clear_code) {
      chase = code_table[chase] >> 8;

    }

    var k = chase;

    var op_end = op + chase_length + (chase_code !== code ? 1 : 0);
    if (op_end > output_length) {
      console.log("Warning, gif stream longer than expected.");
      return;
    }

    output[op++] = k;

    op += chase_length;
    var b = op;  // Track pointer, writing backwards.

    if (chase_code !== code)  // The case of emitting {CODE-1} + k.
      output[op++] = k;

    chase = chase_code;
    while (chase_length--) {
      chase = code_table[chase];
      output[--b] = chase & 0xff;  // Write backwards.
      chase >>= 8;  // Pull down to the prefix code.
    }

    if (prev_code !== null && next_code < 4096) {
      code_table[next_code++] = prev_code << 8 | k;
      // TODO(deanm): Figure out this clearing vs code growth logic better.  I
      // have an feeling that it should just happen somewhere else, for now it
      // is awkward between when we grow past the max and then hit a clear code.
      // For now just check if we hit the max 12-bits (then a clear code should
      // follow, also of course encoded in 12-bits).
      if (next_code >= code_mask+1 && cur_code_size < 12) {
        ++cur_code_size;
        code_mask = code_mask << 1 | 1;
      }
    }

    prev_code = code;
  }

    console.log("Warning, gif stream shorter than expected.");
  }

}

      const eg = rgb[1] - color[1];
      const eb = rgb[2] - color[2];

      preview.data[out] = color[0];
      preview.data[out + 1] = color[1];
      preview.data[out + 2] = color[2];

      addError(x - 1, y + 1, er, eg, eb, 3 / 16);

function buildC3NfpaOutput(frameIndices, width, height, format, delayMs, loop) {

  const c2Lines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C2"];

  for (const indices of frameIndices) {
    c2Lines.push(...buildCompactFrameLines(indices, width, height, format.mode, previousFrame));

  }

  els.sourceCanvas.width = width;
  els.sourceCanvas.height = height;
  ctx.imageSmoothingEnabled = true;

  setCanvasDisplaySize(els.sourceCanvas, width, height);
  els.sourceCanvas.hidden = false;
  els.sourceEmpty.hidden = true;

}

  els.resultCanvas.width = width;
  els.resultCanvas.height = height;
  ctx.putImageData(imageData, 0, 0);
  setCanvasDisplaySize(els.resultCanvas, width, height);
  els.resultCanvas.hidden = false;
  els.resultEmpty.hidden = true;
}

  if (previewTimer) {
    clearTimeout(previewTimer);
    previewTimer = 0;
  }
}

  stopResultAnimation();
  if (!frames.length) return;

  const ctx = els.resultCanvas.getContext("2d");
  els.resultCanvas.width = width;
  els.resultCanvas.height = height;
  setCanvasDisplaySize(els.resultCanvas, width, height);
  els.resultCanvas.hidden = false;
  els.resultEmpty.hidden = true;

  const draw = () => {
    ctx.putImageData(frames[frame], 0, 0);
    frame = (frame + 1) % frames.length;

  const longest = Math.max(width, height);
  const scale = Math.max(1, Math.floor(360 / Math.max(1, longest)));
  canvas.style.width = Math.max(width, width * scale) + "px";

function bytesOf(text) {
  return new Blob([text]).size;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function setFileSummary(name, meta) {
  els.fileName.textContent = name || "No source selected";
  els.fileMeta.textContent = meta || "PNG, JPG, GIF, MP4, WebM";
}

function describeLoadedSource(file, durationSeconds) {
  const size = sourceNaturalWidth() + " x " + sourceNaturalHeight();
  const duration = durationSeconds > 0 ? " | " + durationSeconds.toFixed(2) + "s" : "";
  return sourceKind.toUpperCase() + " " + size + duration + " | " + formatBytes(file.size);
}

function sanitizeBaseName(name) {
  const base = (name || "converted").replace(/\.[^.]+$/, "");
  return (base || "converted").replace(/[^a-z0-9_-]+/gi, "_").replace(/^_+|_+$/g, "") || "converted";
}

function updateOutputName(format) {
  const base = sanitizeBaseName(sourceFileName);
  const suffix = (format.value === "nfpc32" || format.value === "nfpa32") ? "_32" : "";
  outputFileName = base + suffix + "." + format.ext;
  els.outputName.textContent = outputFileName;
}

function updateMetrics(width, height, mode, text, format, frameCount = 1) {
  const outputBytes = bytesOf(text);
  const rawPixels = width * height * frameCount * (mode === 256 ? 2 : 1);
  const rawLines = rawPixels + Math.max(0, height * frameCount - 1);
  els.metricSize.textContent = frameCount > 1 ? width + " x " + height + " x " + frameCount : width + " x " + height;
  els.metricMode.textContent = mode + "-color";
  els.metricBytes.textContent = formatBytes(outputBytes);
  if ((format.compressed || format.animated) && rawLines > 0) {
    const delta = Math.round((1 - outputBytes / rawLines) * 100);
    els.metricRatio.textContent = (delta >= 0 ? "-" : "+") + Math.abs(delta) + "%";

function clearGeneratedResult() {
  stopResultAnimation();
  outputText = "";
  els.output.value = "";
  els.copy.disabled = true;
  els.download.disabled = true;
  els.metricBytes.textContent = "0 B";
  els.metricRatio.textContent = "-";
  els.resultCanvas.hidden = true;
  els.resultEmpty.hidden = false;

function invalidateOutput(message) {
  if (!sourceMedia) return;
  if (els.output.value || !els.resultCanvas.hidden) clearGeneratedResult();
  if (message) setStatus(message);
}

function refreshSourcePreviewFromInputs() {
  if (!sourceMedia) return;
  const { width, height } = normalizeDimensions();
  drawSourcePreview(sourceMedia, width, height);
  els.metricSize.textContent = width + " x " + height;
}

function sourceNaturalWidth() {
  if (!sourceMedia) return 0;
  return sourceMedia.naturalWidth || sourceMedia.videoWidth || sourceMedia.width || 0;
}

function sourceNaturalHeight() {
  if (!sourceMedia) return 0;
  return sourceMedia.naturalHeight || sourceMedia.videoHeight || sourceMedia.height || 0;
}

function sourceMaxWidth() {
  return Math.max(1, sourceNaturalWidth() || 512);
}

function sourceMaxHeight() {
  return Math.max(1, sourceNaturalHeight() || 512);
}

function updateDimensionLimits() {
  const maxWidth = sourceMaxWidth();
  const maxHeight = sourceMaxHeight();
  els.width.max = maxWidth;
  els.height.max = maxHeight;
  els.widthLimit.textContent = "max " + maxWidth;
  els.heightLimit.textContent = "max " + maxHeight;
}

function clampDimension(value, axis = "width") {
  const max = axis === "height" ? sourceMaxHeight() : sourceMaxWidth();
  return Math.max(1, Math.min(max, Math.round(Number(value) || 1)));
}

function normalizeDimensions() {
  const width = clampDimension(els.width.value, "width");
  const height = clampDimension(els.height.value, "height");
  els.width.value = width;
  els.height.value = height;
  return { width, height };
}

function fitSize(maxWidth, maxHeight) {
  if (!sourceMedia) {
    els.width.value = clampDimension(maxWidth, "width");
    els.height.value = clampDimension(maxHeight, "height");
    return;
  }
  const naturalWidth = sourceNaturalWidth() || maxWidth;
  const naturalHeight = sourceNaturalHeight() || maxHeight;
  const ratio = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1);
  els.width.value = clampDimension(Math.floor(naturalWidth * ratio), "width");
  els.height.value = clampDimension(Math.floor(naturalHeight * ratio), "height");
}

function syncRatio(changed) {
  if (!sourceMedia || !els.ratio.checked) return;
  const naturalWidth = sourceNaturalWidth() || 1;
  const naturalHeight = sourceNaturalHeight() || 1;
  if (changed === "width") {
    const width = clampDimension(els.width.value, "width");
    els.width.value = width;
    els.height.value = clampDimension(Math.round(width * naturalHeight / naturalWidth), "height");
  } else {
    const height = clampDimension(els.height.value, "height");
    els.height.value = height;
    els.width.value = clampDimension(Math.round(height * naturalWidth / naturalHeight), "width");
  }
}

function renderSwatches() {
  const format = selectedFormat();
  const mode = format.mode;
  const palette = paletteFor(mode);
  const supportsCompression = format.compressed || format.animated;
  els.paletteName.textContent = mode + "-color palette";
  els.swatches.classList.toggle("mode-256", mode === 256);
  els.animationOptions.classList.toggle("hidden", !format.animated);
  els.compact.disabled = !supportsCompression;
  els.compactSwitch.classList.toggle("disabled", !supportsCompression);
  els.swatches.innerHTML = "";
  for (let i = 0; i < palette.length; i++) {
    const swatch = document.createElement("span");
    swatch.className = "swatch";
    swatch.title = mode === 256 ? i.toString(16).padStart(2, "0") : NFP32_KEYS[i];
    swatch.style.background = "rgb(" + palette[i].join(",") + ")";
    els.swatches.appendChild(swatch);
  }
  els.metricMode.textContent = mode + "-color";
  updateOutputName(format);
}

async function loadImageFromFile(file) {
  if (sourceObjectUrl) URL.revokeObjectURL(sourceObjectUrl);
  sourceObjectUrl = URL.createObjectURL(file);
  const img = new Image();
  img.decoding = "async";
  const loaded = new Promise((resolve, reject) => {
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Cannot load image"));
  });
  img.src = sourceObjectUrl;
  return loaded;
}

async function loadVideoFromFile(file) {
  if (sourceObjectUrl) URL.revokeObjectURL(sourceObjectUrl);
  sourceObjectUrl = URL.createObjectURL(file);
  const video = document.createElement("video");
  video.muted = true;
  video.playsInline = true;
  video.preload = "auto";
  const loaded = new Promise((resolve, reject) => {
    video.onloadeddata = () => resolve(video);
    video.onerror = () => reject(new Error("Cannot load video"));
  });
  video.src = sourceObjectUrl;
  video.load();
  return loaded;
}

function detectSourceKind(file) {
  const name = file.name.toLowerCase();
  if (file.type.startsWith("video/")) return "video";
  if (file.type === "image/gif" || name.endsWith(".gif")) return "gif";
  return "image";
}

async function detectGifDurationSeconds(file) {
  if (typeof GifReader !== "function") return 0;
  const buffer = await file.arrayBuffer();
  const reader = new GifReader(new Uint8Array(buffer));
  let centiseconds = 0;
  for (let i = 0; i < reader.numFrames(); i++) {
    const info = reader.frameInfo(i);
    centiseconds += info.delay || 10;
  }
  return centiseconds / 100;
}

function clampNumber(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}

function waitForFrame() {
  return new Promise(resolve => requestAnimationFrame(resolve));
}

function seekVideo(video, time) {
  const duration = Number.isFinite(video.duration) ? video.duration : 0;
  const target = duration > 0 ? Math.max(0, Math.min(time, Math.max(0, duration - 0.001))) : 0;
  if (Math.abs(video.currentTime - target) < 0.001 && video.readyState >= 2) {
    return Promise.resolve();
  }
  return new Promise((resolve, reject) => {
    const cleanup = () => {
      video.removeEventListener("seeked", onSeeked);
      video.removeEventListener("error", onError);
    };
    const onSeeked = () => {
      cleanup();
      resolve();
    };
    const onError = () => {
      cleanup();
      reject(new Error("Cannot seek video"));
    };
    video.addEventListener("seeked", onSeeked, { once: true });
    video.addEventListener("error", onError, { once: true });
    video.currentTime = target;
  });
}

function drawMediaToImageData(media, width, height) {
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(media, 0, 0, width, height);
  return ctx.getImageData(0, 0, width, height);
}

async function getStaticFrame(width, height) {
  if (sourceKind === "video") {
    await seekVideo(sourceMedia, 0);
  }
  return drawSourcePreview(sourceMedia, width, height);
}

async function extractGifFrames(width, height, fps, maxSeconds) {
  if (typeof GifReader !== "function") {
    throw new Error("GIF decoder is not loaded");
  }

  const buffer = await sourceFile.arrayBuffer();
  const reader = new GifReader(new Uint8Array(buffer));
  const srcCanvas = document.createElement("canvas");
  srcCanvas.width = reader.width;
  srcCanvas.height = reader.height;
  const srcCtx = srcCanvas.getContext("2d", { willReadFrequently: true });
  const srcData = srcCtx.createImageData(reader.width, reader.height);
  const targetCanvas = document.createElement("canvas");
  targetCanvas.width = width;
  targetCanvas.height = height;
  const targetCtx = targetCanvas.getContext("2d", { willReadFrequently: true });
  targetCtx.imageSmoothingEnabled = true;
  targetCtx.imageSmoothingQuality = "high";

  const maxFrames = maxSeconds > 0 ? Math.max(1, Math.floor(maxSeconds * fps)) : Infinity;
  const frames = [];
  for (let i = 0; i < reader.numFrames() && frames.length < maxFrames; i++) {
    reader.decodeAndBlitFrameRGBA(i, srcData.data);
    srcCtx.putImageData(srcData, 0, 0);
    targetCtx.clearRect(0, 0, width, height);
    targetCtx.drawImage(srcCanvas, 0, 0, width, height);
    frames.push(targetCtx.getImageData(0, 0, width, height));
    if (i % 10 === 0) {
      setStatus("Extracting GIF frame " + (i + 1) + "/" + reader.numFrames() + "...");
      await waitForFrame();
    }
  }
  return frames;
}

async function extractVideoFrames(width, height, fps, maxSeconds) {
  const duration = Number.isFinite(sourceMedia.duration) ? sourceMedia.duration : 0;
  const limit = maxSeconds > 0 ? Math.min(duration || maxSeconds, maxSeconds) : duration;
  if (!limit || limit <= 0) return [await getStaticFrame(width, height)];

  const interval = 1 / fps;
  const frames = [];
  const frameCount = Math.max(1, Math.floor(limit * fps));
  for (let i = 0; i < frameCount; i++) {
    const time = Math.min(i * interval, Math.max(0, limit - 0.001));
    await seekVideo(sourceMedia, time);
    frames.push(drawMediaToImageData(sourceMedia, width, height));
    if (i % 5 === 0) {
      setStatus("Extracting video frame " + (i + 1) + "/" + frameCount + "...");
      await waitForFrame();
    }
  }
  await seekVideo(sourceMedia, 0);
  drawSourcePreview(sourceMedia, width, height);
  return frames;
}

async function extractSourceFrames(width, height, fps, maxSeconds) {
  if (sourceKind === "gif") return extractGifFrames(width, height, fps, maxSeconds);
  if (sourceKind === "video") return extractVideoFrames(width, height, fps, maxSeconds);
  return [await getStaticFrame(width, height)];
}

function quantizeFrame(imageData, width, height, mode) {
  return els.dither.checked
    ? quantizeDither(imageData, width, height, mode)
    : quantizeNearest(imageData, width, height, mode);
}

async function loadSelectedFile(file) {
  if (!file) return;
  try {
    setStatus("Loading source...");
    setFileSummary(file.name, "Loading " + formatBytes(file.size) + "...");
    sourceImage = null;
    sourceMedia = null;
    sourceFile = file;
    sourceFileName = file.name;
    sourceKind = detectSourceKind(file);
    updateDimensionLimits();
    clearGeneratedResult();
    els.sourceCanvas.hidden = true;
    els.sourceEmpty.hidden = false;
    els.previewNote.textContent = "";
    if (sourceKind === "video") {
      sourceMedia = await loadVideoFromFile(file);
    } else {
      sourceImage = await loadImageFromFile(file);
      sourceMedia = sourceImage;
    }
    updateDimensionLimits();
    let detectedDuration = 0;
    if (sourceKind === "video") {
      detectedDuration = Number.isFinite(sourceMedia.duration) ? sourceMedia.duration : 0;
    } else if (sourceKind === "gif") {
      detectedDuration = await detectGifDurationSeconds(file);
    }
    if (detectedDuration > 0) {
      els.duration.value = Math.min(3600, detectedDuration).toFixed(detectedDuration < 10 ? 1 : 0);
    } else {
      els.duration.value = 0;
    }
    fitSize(128, 96);
    const { width, height } = normalizeDimensions();
    if (sourceKind === "video") await seekVideo(sourceMedia, 0);
    drawSourcePreview(sourceMedia, width, height);
    els.metricSize.textContent = width + " x " + height;
    els.previewNote.textContent = sourceNaturalWidth() + " x " + sourceNaturalHeight() + " " + sourceKind +
      (detectedDuration > 0 ? "  " + detectedDuration.toFixed(2) + "s" : "");
    setFileSummary(file.name, describeLoadedSource(file, detectedDuration));
    updateOutputName(selectedFormat());
    setStatus("Loaded " + file.name, "good");
  } catch (error) {
    sourceImage = null;
    sourceMedia = null;
    updateDimensionLimits();
    setFileSummary(file.name, "Could not load source | " + formatBytes(file.size));
    setStatus(error.message, "bad");
  }
}

async function handleFileChange() {
  await loadSelectedFile(els.file.files[0]);
}

async function convert() {
  if (!sourceMedia) {
    setStatus("Choose a source first", "bad");
    return;
  }

  const { width, height } = normalizeDimensions();

  const format = selectedFormat();
  setStatus("Converting...");

  await new Promise(resolve => requestAnimationFrame(resolve));

  try {
    if (format.animated) {
      const fps = Math.round(clampNumber(els.fps.value, 1, 60, 10));
      const loop = Math.round(clampNumber(els.loop.value, 0, 65535, 0));
      const maxSeconds = clampNumber(els.duration.value, 0, 3600, 0);
      const delayMs = Math.max(1, Math.floor(1000 / fps));
      const sourceFrames = await extractSourceFrames(width, height, fps, maxSeconds);
      if (!sourceFrames.length) throw new Error("No frames extracted");

      const frameIndices = [];
      const previewFrames = [];
      for (let i = 0; i < sourceFrames.length; i++) {
        const quantized = quantizeFrame(sourceFrames[i], width, height, format.mode);
        frameIndices.push(quantized.indices);
        previewFrames.push(quantized.preview);
        if (i % 5 === 0) {
          setStatus("Encoding frame " + (i + 1) + "/" + sourceFrames.length + "...");
          await waitForFrame();
        }
      }

      outputText = buildNfpaOutput(frameIndices, width, height, format, delayMs, loop);
      els.output.value = outputText;
      startResultAnimation(previewFrames, width, height, delayMs);
      updateMetrics(width, height, format.mode, outputText, format, frameIndices.length);
    } else {
      const source = await getStaticFrame(width, height);
      const quantized = quantizeFrame(source, width, height, format.mode);
      outputText = buildOutput(quantized.indices, width, height, format);
      els.output.value = outputText;
      drawResultPreview(quantized.preview, width, height);
      updateMetrics(width, height, format.mode, outputText, format);
    }

    updateOutputName(format);
    els.copy.disabled = false;
    els.download.disabled = false;
    setStatus("Converted " + outputFileName, "good");
  } catch (error) {
    setStatus(error.message || "Conversion failed", "bad");
  }
}

async function copyOutput() {
  const text = els.output.value;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    setStatus("Copied", "good");
  } catch (_) {
    els.output.focus();
    els.output.select();
    const ok = document.execCommand("copy");
    setStatus(ok ? "Copied" : "Copy failed", ok ? "good" : "bad");
  }
}

function downloadOutput() {
  const text = els.output.value;
  if (!text) return;
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = outputFileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(link.href), 500);
  setStatus("Downloaded " + outputFileName, "good");
}

function useDroppedFile(file) {
  if (!file) return;
  if (typeof DataTransfer === "function") {
    const transfer = new DataTransfer();
    transfer.items.add(file);
    els.file.files = transfer.files;
  }
  loadSelectedFile(file);
}

els.filePick.addEventListener("click", () => els.file.click());
els.file.addEventListener("change", handleFileChange);
els.fileDrop.addEventListener("dragover", event => {
  event.preventDefault();
  els.fileDrop.classList.add("drag");
});
els.fileDrop.addEventListener("dragleave", event => {
  if (!els.fileDrop.contains(event.relatedTarget)) els.fileDrop.classList.remove("drag");
});
els.fileDrop.addEventListener("drop", event => {
  event.preventDefault();
  els.fileDrop.classList.remove("drag");
  useDroppedFile(event.dataTransfer.files[0]);
});
els.fit.addEventListener("click", () => {
  fitSize(128, 96);
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  }
});
els.convert.addEventListener("click", convert);
els.copy.addEventListener("click", copyOutput);
els.download.addEventListener("click", downloadOutput);

els.width.addEventListener("input", () => {
  lastChangedSize = "width";
  syncRatio("width");
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  } else {
    normalizeDimensions();
  }
});
els.height.addEventListener("input", () => {
  lastChangedSize = "height";
  syncRatio("height");
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  } else {
    normalizeDimensions();
  }
});
els.ratio.addEventListener("change", () => {
  syncRatio(lastChangedSize);
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  }
});
els.dither.addEventListener("change", () => invalidateOutput("Dither changed; convert again"));
els.compact.addEventListener("change", () => invalidateOutput("Compression changed; convert again"));
els.fps.addEventListener("input", () => invalidateOutput("Animation settings changed; convert again"));
els.loop.addEventListener("input", () => invalidateOutput("Animation settings changed; convert again"));
els.duration.addEventListener("input", () => invalidateOutput("Animation settings changed; convert again"));

for (const input of document.querySelectorAll("input[name='format']")) {
  input.addEventListener("change", () => {
    renderSwatches();
    invalidateOutput("Format changed; convert again");
  });
}

els.output.addEventListener("input", () => {
  outputText = els.output.value;
  const hasText = outputText.length > 0;
  els.copy.disabled = !hasText;
  els.download.disabled = !hasText;
  els.metricBytes.textContent = formatBytes(bytesOf(outputText));
});

updateDimensionLimits();
renderSwatches();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCOS NFP Converter</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d0b11;
    --surface: #1a1822;
    --surface-high: #23212c;
    --surface-highest: #2c2a38;
    --field: #14131a;
    --outline: #3f3d4a;
    --outline-variant: #2e2c38;
    --text: #e6e1f0;
    --muted: #9e99ac;
    --soft: #6e697c;
    --primary: #b8a8e8;
    --primary-container: #3a3058;
    --on-primary: #e8e0ff;
    --secondary: #9ecfb0;
    --secondary-container: #1f3d2e;
    --warning: #e0c898;
    --warning-container: #3d2e1a;
    --danger: #e8a0a0;
    --danger-container: #3d1c1c;
    --good: #7ec496;
    --good-container: #1a3d2a;
    --focus: rgba(184, 168, 232, .28);
    --mono: "Cascadia Mono", "Consolas", monospace;
    --ui: Inter, "Segoe UI", system-ui, sans-serif;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 24px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.4 var(--ui);
    -webkit-font-smoothing: antialiased;
  }

  button, input, textarea {
    font: inherit;
    color: inherit;
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 40px;
    padding: 8px 16px;
    border: 1px solid transparent;
    border-radius: var(--radius-pill);
    background: var(--surface-high);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: .01em;
    cursor: pointer;
    transition: all .18s cubic-bezier(.4,0,.2,1);
  }

  button:hover {
    background: var(--surface-highest);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
  }

  button:active { transform: translateY(0); }

  button:disabled {
    cursor: not-allowed;
    opacity: .4;
  }

  button.primary {
    background: var(--primary-container);
    color: var(--on-primary);
  }

  button.primary:hover {
    background: #453870;
    box-shadow: 0 4px 16px rgba(184,168,232,.18);
  }

  button.warning {
    background: var(--warning-container);
    color: var(--warning);
  }

  button.warning:hover {
    background: #4d3a20;
    box-shadow: 0 4px 16px rgba(224,200,152,.12);
  }

  svg {
    width: 16px;
    height: 16px;
    flex: 0 0 auto;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--outline-variant);
  }

  h1 {
    margin: 0;
    font-size: 18px;
    line-height: 1.1;
    font-weight: 700;
    letter-spacing: -.01em;
    color: var(--text);
  }

  .status {
    min-width: 0;
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status.good { color: var(--good); }
  .status.bad { color: var(--danger); }

  main {
    display: grid;
    grid-template-columns: minmax(290px, 380px) minmax(420px, 1fr) minmax(320px, 480px);
    min-height: calc(100vh - 56px);
    gap: 10px;
    padding: 10px;
    background: var(--bg);
  }

  section {
    min-width: 0;
    border-radius: var(--radius-lg);
    background: var(--surface);
    overflow: hidden;
    border: 1px solid var(--outline-variant);
  }

  .section-head {
    display: flex;
    align-items: center;
    min-height: 48px;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--outline-variant);
    background: var(--surface-high);
  }

  .section-head strong {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    font-weight: 600;
  }

  .body {
    display: grid;
    gap: 14px;
    padding: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .full { grid-column: 1 / -1; }

  .field {
    display: grid;
    gap: 6px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .field-label {
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }

  .field-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .field-hint {
    color: var(--soft);
    font-size: 11px;
    white-space: nowrap;
  }

  input[type="number"],
  input[type="text"] {
    width: 100%;
    min-height: 40px;
    padding: 8px 12px;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    background: var(--field);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  input[type="number"]:focus,
  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--focus);
  }

  #sourceFile { display: none; }

  .file-picker {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 10px;
    align-items: stretch;
    min-height: 48px;
    padding: 8px;
    border: 1.5px dashed var(--outline);
    border-radius: var(--radius-md);
    background: var(--field);
    transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
  }

  .file-picker:hover {
    border-color: var(--primary);
    background: #191825;
  }

  .file-picker:focus-within,
  .file-picker.drag {
    border-color: var(--primary);
    border-style: solid;
    background: #191825;
    box-shadow: 0 0 0 3px var(--focus);
  }

  .file-picker button {
    min-width: 100px;
    align-self: stretch;
    border-radius: var(--radius-sm);
  }

  .file-name {
    display: grid;
    align-content: center;
    min-width: 0;
    padding: 0 6px;
    color: var(--text);
    font-size: 13px;
    overflow: hidden;
  }

  .file-name strong,
  .file-name span {
    display: block;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-name span {
    margin-top: 2px;
    color: var(--muted);
    font-size: 11px;
  }

  .segment {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .segment.output {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .segment.codec {
    grid-template-columns: repeat(6, minmax(0, 1fr));
  }

  .segment input,
  .switch input {
    position: absolute;
    inline-size: 1px;
    block-size: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .segment span {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 7px 8px;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    background: var(--field);
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    user-select: none;
    transition: all .15s ease;
  }

  .segment input:checked + span {
    border-color: var(--primary);
    background: var(--primary-container);
    color: var(--on-primary);
    font-weight: 500;
  }

  .segment input:focus-visible + span,
  .switch input:focus-visible + span {
    box-shadow: 0 0 0 3px var(--focus);
  }

  .switches {
    display: grid;
    gap: 10px;
  }

  .switch {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 40px;
    padding: 8px 10px;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    background: var(--field);
    color: var(--muted);
    font-size: 13px;
    transition: opacity .15s ease;
  }

  .switch.disabled { opacity: .4; }

  .field.disabled,
  .compression-options.disabled { opacity: .4; }

  .compression-options {
    display: grid;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    background: var(--field);
  }

  .compression-options .segment {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .segment.disabled {
    opacity: .4;
    pointer-events: none;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--primary);
  }

  .switch span:last-child {
    position: relative;
    width: 40px;
    height: 24px;
    border-radius: var(--radius-pill);
    background: #4a4855;
    flex: 0 0 auto;
    transition: background .2s ease;
  }

  .switch span:last-child::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #d0cdd8;
    transition: transform .2s cubic-bezier(.4,0,.2,1), background .2s ease;
  }

  .switch input:checked + span + span {
    background: var(--primary-container);
  }

  .switch input:checked + span + span::after {
    transform: translateX(16px);
    background: var(--on-primary);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hidden {
    display: none !important;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .metric {
    min-width: 0;
    padding: 10px;
    border: 1px solid var(--outline-variant);
    border-radius: var(--radius-sm);
    background: var(--field);
    transition: border-color .15s ease, transform .1s ease;
  }

  .metric:hover {
    border-color: var(--outline);
    transform: translateY(-1px);
  }

  .metric b {
    display: block;
    color: var(--text);
    font-size: 16px;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .metric span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    font-weight: 500;
  }

  .preview-wrap {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    background: var(--surface);
  }

  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    min-height: 0;
    padding: 6px;
    background: var(--surface);
  }

  .preview-pane {
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
    min-height: 0;
    background: var(--surface-high);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--outline-variant);
  }

  .preview-title {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 38px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--outline-variant);
    background: var(--surface-highest);
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 600;
  }

  .canvas-stage {
    display: grid;
    place-items: center;
    align-content: center;
    min-height: 220px;
    padding: 10px;
    overflow: auto;
    position: relative;
    background:
      linear-gradient(45deg, #1a1825 25%, transparent 25%),
      linear-gradient(-45deg, #1a1825 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1825 75%),
      linear-gradient(-45deg, transparent 75%, #1a1825 75%),
      #13111a;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    background-size: 16px 16px;
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid var(--outline);
    border-radius: var(--radius-sm);
    background: black;
    image-rendering: pixelated;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    transition: opacity .35s ease, transform .35s ease;
    opacity: 0;
    transform: scale(.98);
  }

  canvas.visible {
    opacity: 1;
    transform: scale(1);
  }

  .empty-canvas {
    color: var(--soft);
    text-align: center;
    font-size: 13px;
    padding: 40px 20px;
    opacity: .8;
  }

  .palette-strip {
    display: grid;
    gap: 4px;
    padding: 10px 14px;
    border-top: 1px solid var(--outline-variant);
    background: var(--surface);
  }

  .swatches {
    display: grid;
    grid-template-columns: repeat(32, minmax(5px, 1fr));
    gap: 3px;
  }

  .swatches.mode-256 {
    grid-template-columns: repeat(32, minmax(4px, 1fr));
  }

  .swatch {
    aspect-ratio: 1;
    min-height: 8px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,.06);
  }

  .output-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    background: var(--surface);
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 280px;
    padding: 14px;
    border: 0;
    border-radius: 0;
    background: var(--field);
    color: #ddd8e8;
    outline: none;
    resize: none;
    font: 12px/1.4 var(--mono);
    white-space: pre;
    tab-size: 2;
  }

  .inline-note {
    color: var(--muted);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .canvas-badge {
    position: absolute;
    bottom: 12px;
    right: 12px;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity .2s ease;
  }

  .canvas-stage.has-canvas .canvas-badge {
    opacity: 1;
  }

  .progress-wrap {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--outline-variant);
    border-radius: var(--radius-sm);
    background: var(--field);
  }

  .progress-wrap.active {
    display: flex;
  }

  .progress-track {
    flex: 1 1 auto;
    height: 6px;
    border-radius: var(--radius-pill);
    background: #2e2c38;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: var(--radius-pill);
    background: var(--primary);
    transition: width .18s ease;
  }

  .progress-text {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    font-weight: 500;
  }

  .drag-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(3px);
    z-index: 100;
  }

  .drag-overlay.active {
    display: grid;
  }

  .drag-overlay-box {
    padding: 32px 48px;
    border: 2px dashed var(--primary);
    border-radius: var(--radius-xl);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .toast {
    position: fixed;
    bottom: 18px;
    right: 18px;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    background: var(--surface-high);
    border: 1px solid var(--outline-variant);
    color: var(--text);
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,.45);
    transform: translateY(20px);
    opacity: 0;
    transition: transform .25s ease, opacity .25s ease;
    z-index: 101;
    pointer-events: none;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.good { border-color: var(--good); color: var(--good); }
  .toast.bad { border-color: var(--danger); color: var(--danger); }

  @media (max-width: 1120px) {
    main {
      grid-template-columns: 360px minmax(360px, 1fr);
    }

    .output-panel {
      grid-column: 1 / -1;
      border-top: 1px solid var(--outline-variant);
    }
  }

  @media (max-width: 760px) {
    header {
      align-items: flex-start;
      flex-direction: column;
      gap: 6px;
      padding: 10px 14px;
    }

    .status { margin-left: 0; width: 100%; }

    main {
      display: block;
      min-height: auto;
      padding: 8px;
      gap: 8px;
    }

    section {
      border-right: 0;
      margin-bottom: 8px;
    }

    .preview-grid,
    .form-grid {
      grid-template-columns: 1fr;
    }

    .segment.output {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .canvas-stage {
      min-height: 180px;
    }

    textarea {
      min-height: 340px;
    }
  }
</style>
</head>
<body>
<div id="dragOverlay" class="drag-overlay">
  <div class="drag-overlay-box">Drop image or video here</div>
</div>
<div id="toast" class="toast"></div>
<header>
  <h1>CCOS NFP Converter</h1>
  <div id="status" class="status" aria-live="polite">Ready</div>
</header>

<main>
  <section>
    <div class="section-head">
      <strong>Convert</strong>
    </div>
    <div class="body">
      <div class="field full">
        <div class="field-label">Source image or video</div>
        <div id="fileDropZone" class="file-picker">
          <button id="filePickButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"/><path d="M12 4v12"/><path d="m7 9 5-5 5 5"/></svg>
            Choose
          </button>
          <div class="file-name">
            <strong id="fileName">No source selected</strong>
            <span id="fileMeta">PNG, JPG, GIF, MP4, WebM</span>
          </div>
          <input id="sourceFile" type="file" accept="image/*,video/*">
        </div>
      </div>

      <div class="form-grid">
        <label class="field">
          <span class="field-top"><span>Width</span><span id="widthLimit" class="field-hint">max 512</span></span>
          <input id="widthInput" type="number" min="1" max="512" step="1" value="128">
        </label>
        <label class="field">
          <span class="field-top"><span>Height</span><span id="heightLimit" class="field-hint">max 512</span></span>
          <input id="heightInput" type="number" min="1" max="512" step="1" value="96">
        </label>
      </div>

      <div class="field full" role="group" aria-labelledby="outputLabel">
        <div id="outputLabel" class="field-label">Output</div>
        <div class="segment output" id="formatGroup">
          <label><input type="radio" name="format" value="nfp32" checked><span>.nfp</span></label>
          <label><input type="radio" name="format" value="nfp256"><span>.nfp256</span></label>
          <label><input type="radio" name="format" value="nfpc32"><span>.nfpc 32</span></label>
          <label><input type="radio" name="format" value="nfpc256"><span>.nfpc 256</span></label>
          <label><input type="radio" name="format" value="nfpa32"><span>.nfpa 32</span></label>
          <label><input type="radio" name="format" value="nfpa256"><span>.nfpa 256</span></label>
        </div>
      </div>

      <div id="animationOptions" class="form-grid hidden">
        <label class="field">FPS
          <input id="fpsInput" type="number" min="1" max="60" step="1" value="10">
        </label>
        <label class="field">Loop
          <input id="loopInput" type="number" min="0" max="65535" step="1" value="0">
        </label>
        <label class="field full">Max seconds for GIF/video
          <input id="durationInput" type="number" min="0" max="3600" step="0.1" value="0">
        </label>
      </div>

      <div class="switches">
        <label class="switch">
          <input id="ditherInput" type="checkbox">
          <span>Floyd-Steinberg dither</span>
          <span aria-hidden="true"></span>
        </label>
        <label id="compactSwitch" class="switch">
          <input id="compactInput" type="checkbox" checked>
          <span>Best compression</span>
          <span aria-hidden="true"></span>
        </label>
        <div id="compressionOptions" class="compression-options">
          <div class="field-top">
            <span class="field-label">Compression type</span>
            <span id="qualityValue" class="field-hint">Lossless</span>
          </div>
          <div class="segment" id="compressionModeGroup">
            <label><input id="compressionLossless" type="radio" name="compressionMode" value="lossless" checked><span>Lossless</span></label>
            <label><input id="compressionLossy" type="radio" name="compressionMode" value="lossy"><span>Lossy</span></label>
          </div>
          <label id="qualityField" class="field disabled">
            <span class="field-top"><span>Lossy quality</span><span>smaller at low Q</span></span>
            <input id="qualityInput" type="range" min="35" max="100" step="1" value="88" disabled>
          </label>
          <div class="field-top" style="margin-top:10px">
            <span class="field-label">Codec</span>
          </div>
          <div class="segment codec" id="codecGroup">
            <label><input id="codecAuto" type="radio" name="codec" value="auto" checked><span>Auto</span></label>
            <label><input id="codecC2" type="radio" name="codec" value="c2"><span>C2</span></label>
            <label><input id="codecC3" type="radio" name="codec" value="c3"><span>C3</span></label>

  // The basic idea behind LZW is to build a table of previously seen runs

  // 12-bit while input only 8-bit) represent a sequence of previously seen
  // inputs.  The decompressor is able to build the same mapping while

  // encoding and decoder, which is also important for "timing" aspects like
  // how to handle variable bit width code encoding.
  //

  // and then from those build more unique ids (table entries), we can

  // integer values that represent the current byte chains in the encoder.

  // sequences to codes (table indices) without having to store or search
  // any of the code sequences.  So if 'AAAA' has a table entry of 12, the
  // tuple of ('AAAA', K) for any input byte K will be unique, and can be our
  // key.  This leads to a integer value at most 20-bits, which can always
  // fit in an SMI value and be used as a fast sparse array / object key.

      // This is an inline version of emit_code, because this is the core
      // writing routine of the compressor (and V8 cannot inline emit_code
      // because it is a closure here in a different context).  Additionally
      // we can call emit_byte_to_buffer less often, because we can have
      // 30-bits (from our 31-bit signed SMI), and we know our codes will only

        if (next_code >= (1 << cur_code_size)) ++cur_code_size;

function GifReaderLZWOutputIndexStream(code_stream, p, output, output_length) {
  var min_code_size = code_stream[p++];

  var clear_code = 1 << min_code_size;
  var eoi_code = clear_code + 1;
  var next_code = eoi_code + 1;

  var cur_code_size = min_code_size + 1;  // Number of bits per code.
  // NOTE: This shares the same name as the encoder, but has a different
  // meaning here.  Here this masks each code coming from the code stream.
  var code_mask = (1 << cur_code_size) - 1;
  var cur_shift = 0;
  var cur = 0;

  var op = 0;  // Output pointer.

  var subblock_size = code_stream[p++];

  // TODO(deanm): Would using a TypedArray be any faster?  At least it would
  // solve the fast mode / backing store uncertainty.
  // var code_table = Array(4096);
  var code_table = new Int32Array(4096);  // Can be signed, we only use 20 bits.

  var prev_code = null;  // Track code-1.

    // Read up to two bytes, making sure we always 12-bits for max sized code.
    while (cur_shift < 16) {
      if (subblock_size === 0) break;  // No more data to be read.

      cur |= code_stream[p++] << cur_shift;
      cur_shift += 8;

      if (subblock_size === 1) {  // Never let it get to 0 to hold logic above.
        subblock_size = code_stream[p++];  // Next subblock.
      } else {
        --subblock_size;
      }
    }

    // TODO(deanm): We should never really get here, we should have received
    // and EOI.
    if (cur_shift < cur_code_size)
      break;

    var code = cur & code_mask;
    cur >>= cur_code_size;
    cur_shift -= cur_code_size;

    // TODO(deanm): Maybe should check that the first code was a clear code,
    // at least this is what you're supposed to do.  But actually our encoder
    // now doesn't emit a clear code first anyway.
    if (code === clear_code) {
      // We don't actually have to clear the table.  This could be a good idea
      // for greater error checking, but we don't really do any anyway.  We
      // will just track it with next_code and overwrite old entries.

      next_code = eoi_code + 1;
      cur_code_size = min_code_size + 1;
      code_mask = (1 << cur_code_size) - 1;

      // Don't update prev_code ?
      prev_code = null;
      continue;
    } else if (code === eoi_code) {
      break;
    }

    // We have a similar situation as the decoder, where we want to store
    // variable length entries (code table entries), but we want to do in a
    // faster manner than an array of arrays.  The code below stores sort of a
    // linked list within the code table, and then "chases" through it to
    // construct the dictionary entries.  When a new entry is created, just the
    // last byte is stored, and the rest (prefix) of the entry is only
    // referenced by its table entry.  Then the code chases through the
    // prefixes until it reaches a single byte code.  We have to chase twice,
    // first to compute the length, and then to actually copy the data to the
    // output (backwards, since we know the length).  The alternative would be
    // storing something in an intermediate stack, but that doesn't make any
    // more sense.  I implemented an approach where it also stored the length
    // in the code table, although it's a bit tricky because you run out of
    // bits (12 + 12 + 8), but I didn't measure much improvements (the table
    // entries are generally not the long).  Even when I created benchmarks for
    // very long table entries the complexity did not seem worth it.
    // The code table stores the prefix entry in 12 bits and then the suffix
    // byte in 8 bits, so each entry is 20 bits.

    var chase_code = code < next_code ? code : prev_code;

    // Chase what we will output, either {CODE} or {CODE-1}.
    var chase_length = 0;
    var chase = chase_code;
    while (chase > clear_code) {
      chase = code_table[chase] >> 8;
      ++chase_length;
    }

    var k = chase;

    var op_end = op + chase_length + (chase_code !== code ? 1 : 0);
    if (op_end > output_length) {
      console.log("Warning, gif stream longer than expected.");
      return;
    }

    // Already have the first byte from the chase, might as well write it fast.
    output[op++] = k;

    op += chase_length;
    var b = op;  // Track pointer, writing backwards.

    if (chase_code !== code)  // The case of emitting {CODE-1} + k.
      output[op++] = k;

    chase = chase_code;
    while (chase_length--) {
      chase = code_table[chase];
      output[--b] = chase & 0xff;  // Write backwards.
      chase >>= 8;  // Pull down to the prefix code.
    }

    if (prev_code !== null && next_code < 4096) {
      code_table[next_code++] = prev_code << 8 | k;
      // TODO(deanm): Figure out this clearing vs code growth logic better.  I
      // have an feeling that it should just happen somewhere else, for now it
      // is awkward between when we grow past the max and then hit a clear code.
      // For now just check if we hit the max 12-bits (then a clear code should
      // follow, also of course encoded in 12-bits).
      if (next_code >= code_mask+1 && cur_code_size < 12) {
        ++cur_code_size;
        code_mask = code_mask << 1 | 1;
      }
    }

    prev_code = code;
  }

  if (op !== output_length) {
    console.log("Warning, gif stream shorter than expected.");
  }

  return output;
}

  if (!encodedLine) return "";

  while (i < encodedLine.length) {
    const value = encodedLine.slice(i, i + pixelLength);
    let j = i + pixelLength;
    while (j < encodedLine.length && encodedLine.slice(j, j + pixelLength) === value) {
      j += pixelLength;
    }

    let count = (j - i) / pixelLength;
    if (count === 1) {
      result += value;
    } else {
      while (count > 0) {
        const chunk = Math.min(count, 255);
        const countHex = chunk.toString(16).padStart(2, "0");
        const rle = "~" + value + countHex;
        const raw = value.repeat(chunk);
        result += rle.length < raw.length ? rle : raw;
        count -= chunk;

function closeEnoughIndex(a, b, threshold, mode) {
  return a === b || paletteDistanceSq(a, b, mode) <= threshold;
}

function applyLossyCompression(indices, width, height, mode, previousFrame, quality) {
  const threshold = lossyThresholdForQuality(quality, mode);
  if (threshold <= 0) return { indices, changed: 0 };

  const out = new Uint16Array(indices);
  const allowSpatial = quality <= 82 && !(els.dither && els.dither.checked && quality >= 70);
  const verticalThreshold = allowSpatial ? threshold * 0.55 : -1;
  const horizontalThreshold = allowSpatial ? threshold * 0.35 : -1;
  const total = width * height;
  let changed = 0;

  for (let i = 0; i < total; i++) {
    const value = indices[i];
    if (previousFrame && closeEnoughIndex(value, previousFrame[i], threshold, mode)) {
      if (out[i] !== previousFrame[i]) { out[i] = previousFrame[i]; changed++; }
      continue;
    }
    if (verticalThreshold >= 0 && i >= width && closeEnoughIndex(value, out[i - width], verticalThreshold, mode)) {
      if (out[i] !== out[i - width]) { out[i] = out[i - width]; changed++; }
      continue;
    }
    if (horizontalThreshold >= 0 && i % width !== 0 && closeEnoughIndex(value, out[i - 1], horizontalThreshold, mode)) {
      if (out[i] !== out[i - 1]) { out[i] = out[i - 1]; changed++; }
    }
  }

  return { indices: out, changed };
}

function previewFromIndices(indices, width, height, mode) {
  const palette = paletteFor(mode);
  const preview = new ImageData(width, height);
  for (let i = 0, p = 0; i < indices.length; i++, p += 4) {
    const color = palette[indices[i]] || palette[0];
    preview.data[p] = color[0];
    preview.data[p + 1] = color[1];
    preview.data[p + 2] = color[2];
    preview.data[p + 3] = 255;
  }
  return preview;
}

function quantizeNearest(imageData, width, height, mode) {
  const data = imageData.data;
  const indices = new Uint16Array(width * height);
  const preview = new ImageData(width, height);
  const palette = paletteFor(mode);

  for (let p = 0, q = 0; p < data.length; p += 4, q++) {
    const index = findClosest([data[p], data[p + 1], data[p + 2]], mode);
    const color = palette[index];
    indices[q] = index;
    preview.data[p] = color[0];
    preview.data[p + 1] = color[1];
    preview.data[p + 2] = color[2];
    preview.data[p + 3] = 255;
  }

  return { indices, preview };
}

function quantizeDither(imageData, width, height, mode) {
  const source = imageData.data;
  const work = new Float32Array(width * height * 3);
  const indices = new Uint16Array(width * height);
  const preview = new ImageData(width, height);
  const palette = paletteFor(mode);

  for (let p = 0, q = 0; p < source.length; p += 4, q += 3) {
    work[q] = source[p];
    work[q + 1] = source[p + 1];
    work[q + 2] = source[p + 2];
  }

  function addError(x, y, er, eg, eb, factor) {
    if (x < 0 || x >= width || y < 0 || y >= height) return;
    const offset = (y * width + x) * 3;
    work[offset] += er * factor;
    work[offset + 1] += eg * factor;
    work[offset + 2] += eb * factor;
  }

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const offset = (y * width + x) * 3;
      const rgb = [work[offset], work[offset + 1], work[offset + 2]];
      const index = findClosest(rgb, mode);
      const color = palette[index];
      const pixel = y * width + x;
      const out = pixel * 4;
      const er = rgb[0] - color[0];
      const eg = rgb[1] - color[1];
      const eb = rgb[2] - color[2];

      indices[pixel] = index;
      preview.data[out] = color[0];
      preview.data[out + 1] = color[1];
      preview.data[out + 2] = color[2];
      preview.data[out + 3] = 255;

      addError(x + 1, y, er, eg, eb, 7 / 16);
      addError(x - 1, y + 1, er, eg, eb, 3 / 16);
      addError(x, y + 1, er, eg, eb, 5 / 16);
      addError(x + 1, y + 1, er, eg, eb, 1 / 16);
    }
  }

  return { indices, preview };
}

function buildFrameLines(indices, width, height, mode, useRle) {
  const pixelLength = mode === 256 ? 2 : 1;
  const lines = [];
  for (let y = 0; y < height; y++) {
    let line = "";
    const rowOffset = y * width;
    for (let x = 0; x < width; x++) {
      line += encodePixel(indices[rowOffset + x], mode);
    }
    lines.push(useRle ? encodeRleLine(line, pixelLength) : line);
  }
  return lines;
}

function buildCompactFrameLines(indices, width, height, mode, previousFrame) {
  const pixelLength = mode === 256 ? 2 : 1;
  const lines = [];
  let previousRowOffset = -1;

  for (let y = 0; y < height; y++) {
    const rowOffset = y * width;
    const legacyRaw = [];
    for (let x = 0; x < width; x++) {
      legacyRaw.push(encodePixel(indices[rowOffset + x], mode));
    }

    const legacy = encodeRleLine(legacyRaw.join(""), pixelLength);
    const packed = "!" + packedRowBase64(indices, rowOffset, width, mode);
    let best = legacy.length <= packed.length ? legacy : packed;

    if (previousRowOffset >= 0 && rowsEqual(indices, rowOffset, indices, previousRowOffset, width)) {
      best = "=";
    }
    if (previousFrame && rowsEqual(indices, rowOffset, previousFrame, rowOffset, width)) {
      best = "^";
    }

    lines.push(best);
    previousRowOffset = rowOffset;
  }

  return lines;
}

function splitBase64Lines(text) {
  const lines = [];
  const chunkSize = 240;
  for (let i = 0; i < text.length; i += chunkSize) {
    lines.push(text.slice(i, i + chunkSize));
  }
  return ["@" + lines.length, ...lines];
}

function countSameLinear(a, offsetA, b, offsetB, limit) {
  if (!a || !b) return 0;
  let count = 0;
  while (count < limit && a[offsetA + count] === b[offsetB + count]) count++;
  return count;
}

function countRunLinear(indices, offset, total, limit) {
  const value = indices[offset];
  let count = 1;
  const max = Math.min(limit, total - offset);
  while (count < max && indices[offset + count] === value) count++;
  return count;
}

function encodeC3Bytes(indices, width, height, previousFrame) {
  const total = width * height;
  const cost = new Uint32Array(total + 1);
  const choiceOp = new Uint8Array(total);
  const choiceLen = new Uint8Array(total);
  const INF = 0x3fffffff;
  const standardLens = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12, 14, 16, 20, 24, 28, 32, 40, 48, 56, 64];

  function candidateLens(maxLen, allowOne) {
    if (!allowOne && maxLen < 2) return [];
    const out = [];
    for (const len of standardLens) {
      if (len > maxLen) break;
      if (allowOne || len > 1) out.push(len);
    }
    if (maxLen > 0 && out[out.length - 1] !== maxLen) out.push(maxLen);
    return out;
  }

  cost.fill(INF);
  cost[total] = 0;

  for (let pos = total - 1; pos >= 0; pos--) {
    let bestCost = INF;
    let bestOp = 3;
    let bestLen = 1;

    const maxRaw = Math.min(64, total - pos);
    for (const len of candidateLens(maxRaw, true)) {
      const next = pos + len;
      const value = 1 + len + cost[next];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 3;
        bestLen = len;
      }
    }

    const copyLen = previousFrame ? countSameLinear(indices, pos, previousFrame, pos, maxRaw) : 0;
    for (const len of candidateLens(copyLen, true)) {
      const value = 1 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 0;
        bestLen = len;
      }
    }

    let upLen = 0;
    if (pos >= width) {
      upLen = countSameLinear(indices, pos, indices, pos - width, Math.min(64, total - pos));
    }
    for (const len of candidateLens(upLen, true)) {
      const value = 1 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 1;
        bestLen = len;
      }
    }

    const runLen = countRunLinear(indices, pos, total, 64);
    for (const len of candidateLens(runLen, false)) {
      const value = 2 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 2;
        bestLen = len;
      }
    }

    cost[pos] = bestCost;
    choiceOp[pos] = bestOp;
    choiceLen[pos] = bestLen;
  }

  const bytes = [];
  let pos = 0;

  while (pos < total) {
    const op = choiceOp[pos];
    const len = choiceLen[pos] || 1;
    bytes.push(op * 64 + len - 1);
    if (op === 2) {
      bytes.push(indices[pos] & 255);
    } else if (op === 3) {
      for (let i = pos; i < pos + len; i++) bytes.push(indices[i] & 255);
    }
    pos += len;
  }

  return new Uint8Array(bytes);
}

function encodeC4Bytes(indices, width, height, previousFrame) {
  const total = width * height;
  const cost = new Uint32Array(total + 1);
  const choiceOp = new Uint8Array(total);
  const choiceLen = new Uint16Array(total);
  const INF = 0x3fffffff;
  const normalLens = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12, 14, 16, 20, 24, 28, 32, 40, 48, 56];
  const extendedLens = [64, 80, 96, 112, 128, 160, 192, 224, 256, 320, 384, 448, 512, 640, 768, 896, 1024, 1280, 1536, 2048, 2560, 3072, 4096, 5120, 6144, 8192, 10240, 12288, 16384];

  function candidateLens(maxLen, allowOne, isExtended) {
    if (!allowOne && maxLen < 2) return [];
    const out = [];
    const lens = isExtended ? extendedLens : normalLens;
    for (const len of lens) {
      if (len > maxLen) break;
      if (allowOne || len > 1) out.push(len);
    }
    if (maxLen > 0 && out[out.length - 1] !== maxLen) out.push(maxLen);
    return out;
  }

  cost.fill(INF);
  cost[total] = 0;

  for (let pos = total - 1; pos >= 0; pos--) {
    let bestCost = INF;
    let bestOp = 3;
    let bestLen = 1;

    const maxRaw = Math.min(16384, total - pos);
    for (const len of candidateLens(Math.min(maxRaw, 63), true, false)) {
      const next = pos + len;
      const value = 1 + len + cost[next];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 3;
        bestLen = len;
      }
    }
    for (const len of candidateLens(maxRaw, true, true)) {
      if (len < 64) continue;
      const next = pos + len;
      const value = 3 + len + cost[next];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 3;
        bestLen = len;
      }
    }

    const copyLen = previousFrame ? countSameLinear(indices, pos, previousFrame, pos, maxRaw) : 0;
    for (const len of candidateLens(Math.min(copyLen, 63), true, false)) {
      const value = 1 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 0;
        bestLen = len;
      }
    }
    for (const len of candidateLens(copyLen, true, true)) {
      if (len < 64) continue;
      const value = 3 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 0;
        bestLen = len;
      }
    }

    let upLen = 0;
    if (pos >= width) {
      upLen = countSameLinear(indices, pos, indices, pos - width, Math.min(16384, total - pos));
    }
    for (const len of candidateLens(Math.min(upLen, 63), true, false)) {
      const value = 1 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 1;
        bestLen = len;
      }
    }
    for (const len of candidateLens(upLen, true, true)) {
      if (len < 64) continue;
      const value = 3 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 1;
        bestLen = len;
      }
    }

    const runLen = countRunLinear(indices, pos, total, 16384);
    for (const len of candidateLens(Math.min(runLen, 63), false, false)) {
      const value = 2 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 2;
        bestLen = len;
      }
    }
    for (const len of candidateLens(runLen, false, true)) {
      if (len < 64) continue;
      const value = 4 + cost[pos + len];
      if (value < bestCost) {
        bestCost = value;
        bestOp = 2;
        bestLen = len;
      }
    }

    cost[pos] = bestCost;
    choiceOp[pos] = bestOp;
    choiceLen[pos] = bestLen;
  }

  const bytes = [];
  let pos = 0;

  while (pos < total) {
    const op = choiceOp[pos];
    const len = choiceLen[pos] || 1;
    if (len <= 63) {
      bytes.push(op * 64 + len - 1);
    } else {
      const extLen = len - 1;
      bytes.push(0xFF);
      bytes.push(op * 64 + Math.floor(extLen / 256));
      bytes.push(extLen % 256);
    }
    if (op === 2) {
      bytes.push(indices[pos] & 255);
    } else if (op === 3) {
      for (let i = pos; i < pos + len; i++) bytes.push(indices[i] & 255);
    }
    pos += len;
  }

  return new Uint8Array(bytes);
}

function buildC3NfpcOutput(indices, width, height, format) {
  const payload = bytesToBase64(encodeC3Bytes(indices, width, height, null));
  return ["!NFPC " + width + " " + height + " " + format.mode + " C3", ...splitBase64Lines(payload)].join("\n");
}

function buildC3NfpaOutput(frameIndices, width, height, format, delayMs, loop) {
  const lines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C3"];
  let previousFrame = null;
  for (const indices of frameIndices) {
    const payload = bytesToBase64(encodeC3Bytes(indices, width, height, previousFrame));
    lines.push(...splitBase64Lines(payload));
    previousFrame = indices;
  }
  return lines.join("\n");
}

function buildC4NfpcOutput(indices, width, height, format) {
  const payload = bytesToBase64(encodeC4Bytes(indices, width, height, null));
  return ["!NFPC " + width + " " + height + " " + format.mode + " C4", ...splitBase64Lines(payload)].join("\n");
}

function buildC4NfpaOutput(frameIndices, width, height, format, delayMs, loop) {
  const lines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C4"];
  let previousFrame = null;
  for (const indices of frameIndices) {
    const payload = bytesToBase64(encodeC4Bytes(indices, width, height, previousFrame));
    lines.push(...splitBase64Lines(payload));
    previousFrame = indices;
  }
  return lines.join("\n");
}

function writeVarUint(out, value) {
  value = Math.max(0, Math.floor(value));
  while (value >= 128) {
    out.push((value & 127) | 128);
    value = Math.floor(value / 128);
  }
  out.push(value);
}

function appendHashPosition(map, input, pos) {
  if (pos + 2 >= input.length) return;
  const key = (input[pos] << 16) | (input[pos + 1] << 8) | input[pos + 2];
  let list = map.get(key);
  if (!list) {
    list = [];
    map.set(key, list);
  }
  list.push(pos);
  if (list.length > 96) list.splice(0, list.length - 96);
}

function lzssCompress(input) {
  const out = [];
  const map = new Map();
  const maxDistance = 4096;
  const maxLength = 18;
  let pos = 0;

  while (pos < input.length) {
    const flagIndex = out.length;
    let flags = 0;
    out.push(0);

    for (let bit = 0; bit < 8 && pos < input.length; bit++) {
      let bestLen = 0;
      let bestDist = 0;

      if (pos + 2 < input.length) {
        const key = (input[pos] << 16) | (input[pos + 1] << 8) | input[pos + 2];
        const list = map.get(key) || [];
        const start = Math.max(0, list.length - 72);
        const max = Math.min(maxLength, input.length - pos);
        for (let i = list.length - 1; i >= start; i--) {
          const ref = list[i];
          const dist = pos - ref;
          if (dist <= 0 || dist > maxDistance) continue;
          let len = 0;
          while (len < max && input[ref + len] === input[pos + len]) len++;
          if (len >= 3 && len > bestLen) {
            bestLen = len;
            bestDist = dist;
            if (len === maxLength) break;
          }
        }
      }

      if (bestLen >= 3) {
        flags |= (1 << bit);
        const dist = bestDist - 1;
        out.push(((bestLen - 3) << 4) | ((dist >> 8) & 15), dist & 255);
        for (let i = 0; i < bestLen; i++) appendHashPosition(map, input, pos + i);
        pos += bestLen;
      } else {
        out.push(input[pos]);
        appendHashPosition(map, input, pos);
        pos++;
      }
    }

    out[flagIndex] = flags;
  }

  return new Uint8Array(out);
}

function lzwCompressIndices(values, mode) {
  const minCodeSize = mode === 256 ? 8 : 5;
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  const out = [];
  let bitBuffer = 0;
  let bitCount = 0;

  function emit(code) {
    bitBuffer |= code << bitCount;
    bitCount += 12;
    while (bitCount >= 8) {
      out.push(bitBuffer & 255);
      bitBuffer >>= 8;
      bitCount -= 8;
    }
  }

  function reset(dictState) {
    dictState.map.clear();
    dictState.nextCode = eoiCode + 1;
  }

  const dict = { map: new Map(), nextCode: eoiCode + 1 };
  emit(clearCode);
  if (!values || values.length === 0) {
    emit(eoiCode);
    if (bitCount > 0) out.push(bitBuffer & 255);
    return new Uint8Array(out);
  }

  const literalMask = mode === 256 ? 255 : 31;
  let prefix = values[0] & literalMask;
  for (let i = 1; i < values.length; i++) {
    const value = values[i] & literalMask;
    const key = prefix * 256 + value;
    const found = dict.map.get(key);
    if (found !== undefined) {
      prefix = found;
      continue;
    }

    emit(prefix);
    if (dict.nextCode < 4096) {
      dict.map.set(key, dict.nextCode++);
    } else {
      emit(clearCode);
      reset(dict);
    }
    prefix = value;
  }

  emit(prefix);
  emit(eoiCode);
  if (bitCount > 0) out.push(bitBuffer & 255);
  return new Uint8Array(out);
}

function frameDiffRect(indices, previousFrame, width, height) {
  if (!previousFrame) return { x: 0, y: 0, w: width, h: height, full: true };
  let minX = width;
  let minY = height;
  let maxX = -1;
  let maxY = -1;
  for (let y = 0; y < height; y++) {
    const rowOffset = y * width;
    for (let x = 0; x < width; x++) {
      const idx = rowOffset + x;
      if (indices[idx] !== previousFrame[idx]) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < minX || maxY < minY) return null;
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1, full: minX === 0 && minY === 0 && maxX === width - 1 && maxY === height - 1 };
}

function extractRectIndices(indices, width, rect) {
  const out = new Uint16Array(rect.w * rect.h);
  let p = 0;
  for (let y = 0; y < rect.h; y++) {
    const rowOffset = (rect.y + y) * width + rect.x;
    for (let x = 0; x < rect.w; x++) out[p++] = indices[rowOffset + x];
  }
  return out;
}

function rawIndexBytes(values) {
  const out = new Uint8Array(values.length);
  for (let i = 0; i < values.length; i++) out[i] = values[i] & 255;
  return out;
}

function c6FrameCandidate(type, rect, payload) {
  const out = [type];
  if (type === 2 || type === 4) {
    writeVarUint(out, rect.x);
    writeVarUint(out, rect.y);
    writeVarUint(out, rect.w);
    writeVarUint(out, rect.h);
  }
  writeVarUint(out, payload.length);
  for (let i = 0; i < payload.length; i++) out.push(payload[i]);
  return out;
}

function appendC6Frame(stream, indices, width, height, mode, previousFrame) {
  const rect = frameDiffRect(indices, previousFrame, width, height);
  if (!rect) {
    stream.push(0);
    return;
  }

  const full = rect.full ? indices : null;
  const rectValues = rect.full ? indices : extractRectIndices(indices, width, rect);
  const candidates = [];

  if (full) {
    candidates.push(c6FrameCandidate(1, null, lzwCompressIndices(full, mode)));
    candidates.push(c6FrameCandidate(3, null, rawIndexBytes(full)));
  } else {
    candidates.push(c6FrameCandidate(2, rect, lzwCompressIndices(rectValues, mode)));
    candidates.push(c6FrameCandidate(4, rect, rawIndexBytes(rectValues)));
    if (rect.w * rect.h > width * height * 0.65) {
      candidates.push(c6FrameCandidate(1, null, lzwCompressIndices(indices, mode)));
      candidates.push(c6FrameCandidate(3, null, rawIndexBytes(indices)));
    }
  }

  let best = candidates[0];
  for (const candidate of candidates) {
    if (candidate.length < best.length) best = candidate;
  }
  for (let i = 0; i < best.length; i++) stream.push(best[i]);
}

function buildC6Payload(frameIndices, width, height, mode) {
  const stream = [];
  let previousFrame = null;
  for (const indices of frameIndices) {
    appendC6Frame(stream, indices, width, height, mode, previousFrame);
    previousFrame = indices;
  }

  const frameStream = new Uint8Array(stream);
  const lzss = lzssCompress(frameStream);
  const useLzss = lzss.length < frameStream.length;
  const body = new Uint8Array((useLzss ? lzss.length : frameStream.length) + 1);
  body[0] = useLzss ? 1 : 0;
  body.set(useLzss ? lzss : frameStream, 1);
  return bytesToBase64(body);
}

function buildC6NfpaOutput(frameIndices, width, height, format, delayMs, loop) {
  const payload = buildC6Payload(frameIndices, width, height, format.mode);
  return [
    "!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C6",
    ...splitBase64Lines(payload)
  ].join("\n");
}

function buildC5Payload(frameIndices, width, height) {
  const stream = [];
  let previousFrame = null;
  for (const indices of frameIndices) {
    const frameBytes = encodeC3Bytes(indices, width, height, previousFrame);
    writeVarUint(stream, frameBytes.length);
    for (let i = 0; i < frameBytes.length; i++) stream.push(frameBytes[i]);
    previousFrame = indices;
  }
  return bytesToBase64(lzssCompress(new Uint8Array(stream)));
}

function buildC5NfpcOutput(indices, width, height, format) {
  const payload = buildC5Payload([indices], width, height);
  return ["!NFPC " + width + " " + height + " " + format.mode + " C5", ...splitBase64Lines(payload)].join("\n");
}

function buildC5NfpaOutput(frameIndices, width, height, format, delayMs, loop) {
  const payload = buildC5Payload(frameIndices, width, height);
  return [
    "!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C5",
    ...splitBase64Lines(payload)
  ].join("\n");
}

function shortestOutput(candidates) {
  let best = candidates[0];
  for (const candidate of candidates) {
    if (bytesOf(candidate) < bytesOf(best)) best = candidate;
  }
  return best;
}

function buildOutput(indices, width, height, format) {
  const mode = format.mode;
  const lines = [];
  const legacyLines = [];

  if (format.compressed) {
    legacyLines.push("!NFPC " + width + " " + height + " " + mode);
  }

  legacyLines.push(...buildFrameLines(indices, width, height, mode, format.compressed));
  const legacyOutput = legacyLines.join("\n");
  if (!format.compressed || !els.compact.checked) return legacyOutput;

  const codec = selectedCodec();
  if (codec === "c2") {
    return [
      "!NFPC " + width + " " + height + " " + mode + " C2",
      ...buildCompactFrameLines(indices, width, height, mode, null)
    ].join("\n");
  }
  if (codec === "c3") return buildC3NfpcOutput(indices, width, height, format);
  if (codec === "c4") return buildC4NfpcOutput(indices, width, height, format);
  if (codec === "c5") return buildC5NfpcOutput(indices, width, height, format);

  const c2Output = [
    "!NFPC " + width + " " + height + " " + mode + " C2",
    ...buildCompactFrameLines(indices, width, height, mode, null)
  ].join("\n");
  const c3Output = buildC3NfpcOutput(indices, width, height, format);
  const c4Output = buildC4NfpcOutput(indices, width, height, format);
  const c5Output = buildC5NfpcOutput(indices, width, height, format);

  return shortestOutput([legacyOutput, c2Output, c3Output, c4Output, c5Output]);
}

function buildNfpaOutput(frameIndices, width, height, format, delayMs, loop) {
  const legacyLines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length];
  for (const indices of frameIndices) {
    legacyLines.push(...buildFrameLines(indices, width, height, format.mode, true));
  }
  const legacyOutput = legacyLines.join("\n");
  if (!els.compact.checked) return legacyOutput;

  const codec = selectedCodec();
  if (codec === "c2") {
    const c2Lines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C2"];
    let previousFrame = null;
    for (const indices of frameIndices) {
      c2Lines.push(...buildCompactFrameLines(indices, width, height, format.mode, previousFrame));
      previousFrame = indices;
    }
    return c2Lines.join("\n");
  }
  if (codec === "c3") return buildC3NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  if (codec === "c4") return buildC4NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  if (codec === "c5") return buildC5NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  if (codec === "c6") return buildC6NfpaOutput(frameIndices, width, height, format, delayMs, loop);

  const c2Lines = ["!NFPA " + width + " " + height + " " + format.mode + " " + delayMs + " " + loop + " " + frameIndices.length + " C2"];
  let previousFrame = null;
  for (const indices of frameIndices) {
    c2Lines.push(...buildCompactFrameLines(indices, width, height, format.mode, previousFrame));
    previousFrame = indices;
  }
  const c2Output = c2Lines.join("\n");
  const c3Output = buildC3NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  const c4Output = buildC4NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  const c5Output = buildC5NfpaOutput(frameIndices, width, height, format, delayMs, loop);
  const c6Output = buildC6NfpaOutput(frameIndices, width, height, format, delayMs, loop);

  return shortestOutput([legacyOutput, c2Output, c3Output, c4Output, c5Output, c6Output]);
}

function drawSourcePreview(img, width, height) {
  const ctx = els.sourceCanvas.getContext("2d", { willReadFrequently: true });
  els.sourceCanvas.width = width;
  els.sourceCanvas.height = height;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.clearRect(0, 0, width, height);
  ctx.drawImage(img, 0, 0, width, height);
  setCanvasDisplaySize(els.sourceCanvas, width, height);
  els.sourceCanvas.hidden = false;
  els.sourceEmpty.hidden = true;
  els.sourceStage.classList.add("has-canvas");
  updateCanvasBadge(els.sourceBadge, width, height);
  requestAnimationFrame(() => setCanvasVisible(els.sourceCanvas, true));
  return ctx.getImageData(0, 0, width, height);
}

function drawResultPreview(imageData, width, height) {
  stopResultAnimation();
  const ctx = els.resultCanvas.getContext("2d");
  els.resultCanvas.width = width;
  els.resultCanvas.height = height;
  ctx.putImageData(imageData, 0, 0);
  setCanvasDisplaySize(els.resultCanvas, width, height);
  els.resultCanvas.hidden = false;
  els.resultEmpty.hidden = true;
  els.resultStage.classList.add("has-canvas");
  updateCanvasBadge(els.resultBadge, width, height);
  requestAnimationFrame(() => setCanvasVisible(els.resultCanvas, true));
}

function stopResultAnimation() {
  if (previewTimer) {
    clearTimeout(previewTimer);
    previewTimer = 0;
  }
}

function startResultAnimation(frames, width, height, delayMs) {
  stopResultAnimation();
  if (!frames.length) return;

  const ctx = els.resultCanvas.getContext("2d");
  els.resultCanvas.width = width;
  els.resultCanvas.height = height;
  setCanvasDisplaySize(els.resultCanvas, width, height);
  els.resultCanvas.hidden = false;
  els.resultEmpty.hidden = true;
  els.resultStage.classList.add("has-canvas");
  updateCanvasBadge(els.resultBadge, width, height);
  setCanvasVisible(els.resultCanvas, true);

  let frame = 0;
  const draw = () => {
    ctx.putImageData(frames[frame], 0, 0);
    frame = (frame + 1) % frames.length;
    if (frames.length > 1) previewTimer = setTimeout(draw, delayMs);
  };
  draw();
}

function setCanvasDisplaySize(canvas, width, height) {
  canvas.style.width = "100%";
  canvas.style.height = "auto";
}

function bytesOf(text) {
  return new Blob([text]).size;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function setFileSummary(name, meta) {
  els.fileName.textContent = name || "No source selected";
  els.fileMeta.textContent = meta || "PNG, JPG, GIF, MP4, WebM";
}

function describeLoadedSource(file, durationSeconds) {
  const size = sourceNaturalWidth() + " x " + sourceNaturalHeight();
  const duration = durationSeconds > 0 ? " | " + durationSeconds.toFixed(2) + "s" : "";
  return sourceKind.toUpperCase() + " " + size + duration + " | " + formatBytes(file.size);
}

function cleanupSourceObjectUrl() {
  if (sourceObjectUrl && sourceObjectUrl.startsWith("blob:")) {
    URL.revokeObjectURL(sourceObjectUrl);
  }
  sourceObjectUrl = "";
}

function cleanupSourceVideoElement() {
  if (!sourceVideoElement) return;
  sourceVideoElement.pause();
  sourceVideoElement.removeAttribute("src");
  sourceVideoElement.load();
  sourceVideoElement.remove();
  sourceVideoElement = null;
}

function sanitizeBaseName(name) {
  const base = (name || "converted").replace(/\.[^.]+$/, "");
  return (base || "converted").replace(/[^a-z0-9_-]+/gi, "_").replace(/^_+|_+$/g, "") || "converted";
}

function updateOutputName(format) {
  const base = sanitizeBaseName(sourceFileName);
  const suffix = (format.value === "nfpc32" || format.value === "nfpa32") ? "_32" : "";
  outputFileName = base + suffix + "." + format.ext;
  els.outputName.textContent = outputFileName;
}

function updateMetrics(width, height, mode, text, format, frameCount = 1) {
  const outputBytes = bytesOf(text);
  const rawPixels = width * height * frameCount * (mode === 256 ? 2 : 1);
  const rawLines = rawPixels + Math.max(0, height * frameCount - 1);
  els.metricSize.textContent = frameCount > 1 ? width + " x " + height + " x " + frameCount : width + " x " + height;
  els.metricMode.textContent = mode + "-color";
  els.metricBytes.textContent = formatBytes(outputBytes);
  if ((format.compressed || format.animated) && rawLines > 0) {
    const delta = Math.round((1 - outputBytes / rawLines) * 100);
    els.metricRatio.textContent = (delta >= 0 ? "-" : "+") + Math.abs(delta) + "%";
  } else {
    els.metricRatio.textContent = "-";
  }
}

function clearGeneratedResult() {
  stopResultAnimation();
  outputText = "";
  els.output.value = "";
  els.copy.disabled = true;
  els.download.disabled = true;
  els.metricBytes.textContent = "0 B";
  els.metricRatio.textContent = "-";
  els.resultCanvas.hidden = true;
  els.resultEmpty.hidden = false;
  els.resultStage.classList.remove("has-canvas");
  setCanvasVisible(els.resultCanvas, false);
}

function invalidateOutput(message) {
  if (!sourceMedia) return;
  if (els.output.value || !els.resultCanvas.hidden) clearGeneratedResult();
  if (message) setStatus(message);
}

function refreshSourcePreviewFromInputs() {
  if (!sourceMedia) return;
  const { width, height } = normalizeDimensions();
  drawSourcePreview(sourceMedia, width, height);
  els.metricSize.textContent = width + " x " + height;
}

function sourceNaturalWidth() {
  if (!sourceMedia) return 0;
  return sourceMedia.naturalWidth || sourceMedia.videoWidth || sourceMedia.width || 0;
}

function sourceNaturalHeight() {
  if (!sourceMedia) return 0;
  return sourceMedia.naturalHeight || sourceMedia.videoHeight || sourceMedia.height || 0;
}

function sourceMaxWidth() {
  return Math.max(1, sourceNaturalWidth() || 512);
}

function sourceMaxHeight() {
  return Math.max(1, sourceNaturalHeight() || 512);
}

function updateDimensionLimits() {
  const maxWidth = sourceMaxWidth();
  const maxHeight = sourceMaxHeight();
  els.width.max = maxWidth;
  els.height.max = maxHeight;
  els.widthLimit.textContent = "max " + maxWidth;
  els.heightLimit.textContent = "max " + maxHeight;
}

function clampDimension(value, axis = "width") {
  const max = axis === "height" ? sourceMaxHeight() : sourceMaxWidth();
  return Math.max(1, Math.min(max, Math.round(Number(value) || 1)));
}

function normalizeDimensions() {
  const width = clampDimension(els.width.value, "width");
  const height = clampDimension(els.height.value, "height");
  els.width.value = width;
  els.height.value = height;
  return { width, height };
}

function fitSize(maxWidth, maxHeight) {
  if (!sourceMedia) {
    els.width.value = clampDimension(maxWidth, "width");
    els.height.value = clampDimension(maxHeight, "height");
    return;
  }
  const naturalWidth = sourceNaturalWidth() || maxWidth;
  const naturalHeight = sourceNaturalHeight() || maxHeight;
  const ratio = Math.min(maxWidth / naturalWidth, maxHeight / naturalHeight, 1);
  els.width.value = clampDimension(Math.floor(naturalWidth * ratio), "width");
  els.height.value = clampDimension(Math.floor(naturalHeight * ratio), "height");
}

function syncRatio(changed) {
  if (!sourceMedia || !els.ratio.checked) return;
  const naturalWidth = sourceNaturalWidth() || 1;
  const naturalHeight = sourceNaturalHeight() || 1;
  if (changed === "width") {
    const width = clampDimension(els.width.value, "width");
    els.width.value = width;
    els.height.value = clampDimension(Math.round(width * naturalHeight / naturalWidth), "height");
  } else {
    const height = clampDimension(els.height.value, "height");
    els.height.value = height;
    els.width.value = clampDimension(Math.round(height * naturalWidth / naturalHeight), "width");
  }
}

function renderSwatches() {
  const format = selectedFormat();
  const mode = format.mode;
  const palette = paletteFor(mode);
  const supportsCompression = format.compressed || format.animated;
  const supportsC6 = supportsCompression && format.animated;
  const supportsLossy = supportsCompression && els.compact.checked;
  els.paletteName.textContent = mode + "-color palette";
  els.swatches.classList.toggle("mode-256", mode === 256);
  els.animationOptions.classList.toggle("hidden", !format.animated);
  els.compact.disabled = !supportsCompression;
  els.compactSwitch.classList.toggle("disabled", !supportsCompression);
  if (!supportsCompression) els.compressionLossless.checked = true;
  if (!supportsCompression) els.codecAuto.checked = true;
  if (!supportsC6 && els.codecC6.checked) els.codecAuto.checked = true;
  if (!supportsLossy && els.compressionLossy.checked) els.compressionLossless.checked = true;
  const lossy = lossyActive(format);
  els.compressionOptions.classList.toggle("disabled", !supportsCompression);
  els.codecGroup.classList.toggle("disabled", !supportsCompression);
  document.querySelectorAll("input[name='codec']").forEach(input => {
    input.disabled = !supportsCompression || (input.value === "c6" && !supportsC6);
  });
  els.compressionLossless.disabled = !supportsCompression;
  els.compressionLossy.disabled = !supportsLossy;
  els.quality.disabled = !lossy;
  els.qualityField.classList.toggle("disabled", !lossy);
  els.qualityValue.textContent = !supportsCompression ? "Not supported" : (lossy ? ("Q " + compressionQuality()) : "Lossless");
  els.swatches.innerHTML = "";
  for (let i = 0; i < palette.length; i++) {
    const swatch = document.createElement("span");
    swatch.className = "swatch";
    swatch.title = mode === 256 ? i.toString(16).padStart(2, "0") : NFP32_KEYS[i];
    swatch.style.background = "rgb(" + palette[i].join(",") + ")";
    els.swatches.appendChild(swatch);
  }
  els.metricMode.textContent = mode + "-color";
  updateOutputName(format);
}

async function loadImageFromFile(file) {
  cleanupSourceVideoElement();
  cleanupSourceObjectUrl();
  sourceObjectUrl = URL.createObjectURL(file);
  const img = new Image();
  img.decoding = "async";
  const loaded = new Promise((resolve, reject) => {
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Cannot load image"));
  });
  img.src = sourceObjectUrl;
  return loaded;
}

async function loadVideoFromFile(file) {
  cleanupSourceVideoElement();
  cleanupSourceObjectUrl();
  const blobUrl = URL.createObjectURL(file);
  sourceObjectUrl = blobUrl;
  try {
    return await loadVideoFromUrl(blobUrl, file);
  } catch (firstError) {
    cleanupSourceVideoElement();
    cleanupSourceObjectUrl();
    if (file.size <= 128 * 1024 * 1024) {
      setStatus("Retrying video load...");
      try {
        const dataUrl = await readFileAsDataUrl(file);
        return await loadVideoFromUrl(dataUrl, file);
      } catch (_) {
        cleanupSourceVideoElement();
      }
    }
    throw firstError;
  }
}

function loadVideoFromUrl(url, file) {
  const video = document.createElement("video");
  video.muted = true;
  video.playsInline = true;
  video.preload = "auto";
  video.controls = false;
  video.style.position = "fixed";
  video.style.left = "-10000px";
  video.style.top = "0";
  video.style.width = "1px";
  video.style.height = "1px";
  video.style.opacity = "0";
  video.style.pointerEvents = "none";
  document.body.appendChild(video);

  return waitForVideoReady(video, file, url).then(() => {
    sourceVideoElement = video;
    return video;
  }).catch(error => {
    video.remove();
    throw error;
  });
}

function waitForVideoReady(video, file, url) {
  return new Promise((resolve, reject) => {
    let settled = false;
    let nudged = false;
    let timeout = 0;

    const cleanup = () => {
      clearTimeout(timeout);
      video.removeEventListener("loadedmetadata", onReady);
      video.removeEventListener("loadeddata", onReady);
      video.removeEventListener("canplay", onReady);
      video.removeEventListener("canplaythrough", onReady);
      video.removeEventListener("seeked", onReady);
      video.removeEventListener("timeupdate", onReady);
      video.removeEventListener("error", onError);
    };
    const done = () => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve(video);
    };
    const fail = message => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error(message));
    };
    const nudgeFrameDecode = () => {
      if (nudged || !video.videoWidth || !video.videoHeight) return;
      nudged = true;
      const duration = Number.isFinite(video.duration) ? video.duration : 0;
      const target = duration > 0 ? Math.min(0.05, Math.max(0, duration - 0.001)) : 0;
      try {
        video.currentTime = target;
      } catch (_) {}
    };
    function onReady() {
      if (video.videoWidth > 0 && video.videoHeight > 0 && video.readyState >= 2) {
        done();
        return;
      }
      if (video.readyState >= 1) nudgeFrameDecode();
    }
    function onError() {
      fail(describeVideoLoadError(video, file, url));
    }

    video.addEventListener("loadedmetadata", onReady);
    video.addEventListener("loadeddata", onReady);
    video.addEventListener("canplay", onReady);
    video.addEventListener("canplaythrough", onReady);
    video.addEventListener("seeked", onReady);
    video.addEventListener("timeupdate", onReady);
    video.addEventListener("error", onError);
    timeout = setTimeout(() => {
      if (video.videoWidth > 0 && video.videoHeight > 0 && video.readyState >= 1) {
        done();
      } else {
        fail("Video load timed out. Try H.264 MP4 or VP9/WebM.");
      }
    }, 15000);

    video.src = url;
    video.load();
  });
}

function describeVideoLoadError(video, file, url) {
  const code = video.error ? video.error.code : 0;
  const reasons = {
    1: "Video load was aborted",
    2: "Chrome could not read the video file",
    3: "Chrome could not decode this video codec",
    4: "Chrome does not support this video type or codec"
  };
  const reason = reasons[code] || "Chrome could not load this video";
  const type = file.type || "unknown MIME";
  const support = type !== "unknown MIME" ? video.canPlayType(type) : "";
  const supportNote = support ? "support: " + support : "support: unknown";
  const sourceNote = url.startsWith("data:") ? "data URL" : "blob URL";
  return reason + ". Use H.264 MP4 or VP8/VP9 WebM. (" + type + ", " + supportNote + ", " + sourceNote + ")";
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Cannot read video file"));
    reader.readAsDataURL(file);
  });
}

function detectSourceKind(file) {
  const name = file.name.toLowerCase();
  if (file.type.startsWith("video/")) return "video";
  if (/\.(mp4|m4v|webm|mov|ogv|ogg)$/i.test(name)) return "video";
  if (file.type === "image/gif" || name.endsWith(".gif")) return "gif";
  return "image";
}

async function detectGifDurationSeconds(file) {
  if (typeof GifReader !== "function") return 0;
  const buffer = await file.arrayBuffer();
  const reader = new GifReader(new Uint8Array(buffer));
  let centiseconds = 0;
  for (let i = 0; i < reader.numFrames(); i++) {
    const info = reader.frameInfo(i);
    centiseconds += info.delay || 10;
  }
  return centiseconds / 100;
}

function clampNumber(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}

function waitForFrame() {
  return new Promise(resolve => requestAnimationFrame(resolve));
}

function seekVideo(video, time) {
  const duration = Number.isFinite(video.duration) ? video.duration : 0;
  const target = duration > 0 ? Math.max(0, Math.min(time, Math.max(0, duration - 0.001))) : 0;
  if (Math.abs(video.currentTime - target) < 0.001 && video.readyState >= 2) {
    return Promise.resolve();
  }
  return new Promise((resolve, reject) => {
    let settled = false;
    let timeout = 0;
    const cleanup = () => {
      clearTimeout(timeout);
      video.removeEventListener("seeked", onSeeked);
      video.removeEventListener("loadeddata", onReady);
      video.removeEventListener("canplay", onReady);
      video.removeEventListener("error", onError);
    };
    const done = () => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve();
    };
    const fail = error => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(error);
    };
    const onSeeked = () => done();
    const onReady = () => {
      if (video.readyState >= 2 && Math.abs(video.currentTime - target) < 0.08) done();
    };
    const onError = () => {
      fail(new Error("Cannot seek video"));
    };
    video.addEventListener("seeked", onSeeked, { once: true });
    video.addEventListener("loadeddata", onReady, { once: true });
    video.addEventListener("canplay", onReady, { once: true });
    video.addEventListener("error", onError, { once: true });
    timeout = setTimeout(() => fail(new Error("Cannot seek video: timed out")), 10000);
    try {
      video.currentTime = target;
      onReady();
    } catch (error) {
      fail(error);
    }
  });
}

function drawMediaToImageData(media, width, height) {
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(media, 0, 0, width, height);
  return ctx.getImageData(0, 0, width, height);
}

async function getStaticFrame(width, height) {
  if (sourceKind === "video") {
    await seekVideo(sourceMedia, 0);
  }
  return drawSourcePreview(sourceMedia, width, height);
}

async function extractGifFrames(width, height, fps, maxSeconds) {
  if (typeof GifReader !== "function") {
    throw new Error("GIF decoder is not loaded");
  }

  const buffer = await sourceFile.arrayBuffer();
  const reader = new GifReader(new Uint8Array(buffer));
  const srcCanvas = document.createElement("canvas");
  srcCanvas.width = reader.width;
  srcCanvas.height = reader.height;
  const srcCtx = srcCanvas.getContext("2d", { willReadFrequently: true });
  const srcData = srcCtx.createImageData(reader.width, reader.height);
  const targetCanvas = document.createElement("canvas");
  targetCanvas.width = width;
  targetCanvas.height = height;
  const targetCtx = targetCanvas.getContext("2d", { willReadFrequently: true });
  targetCtx.imageSmoothingEnabled = true;
  targetCtx.imageSmoothingQuality = "high";

  const maxFrames = maxSeconds > 0 ? Math.max(1, Math.floor(maxSeconds * fps)) : Infinity;
  const total = Math.min(reader.numFrames(), maxFrames);
  const frames = [];
  for (let i = 0; i < reader.numFrames() && frames.length < maxFrames; i++) {
    reader.decodeAndBlitFrameRGBA(i, srcData.data);
    srcCtx.putImageData(srcData, 0, 0);
    targetCtx.clearRect(0, 0, width, height);
    targetCtx.drawImage(srcCanvas, 0, 0, width, height);
    frames.push(targetCtx.getImageData(0, 0, width, height));
    if (i % 3 === 0) {
      const pct = Math.round((frames.length / total) * 100);
      setProgress(true, pct, "GIF frame " + frames.length + "/" + total);
      setStatus("Extracting GIF frame " + (i + 1) + "/" + reader.numFrames() + "...");
      await waitForFrame();
    }
  }
  return frames;
}

async function extractVideoFrames(width, height, fps, maxSeconds) {
  const duration = Number.isFinite(sourceMedia.duration) ? sourceMedia.duration : 0;
  const limit = maxSeconds > 0 ? Math.min(duration || maxSeconds, maxSeconds) : duration;
  if (!limit || limit <= 0) return [await getStaticFrame(width, height)];

  const interval = 1 / fps;
  const frames = [];
  const frameCount = Math.max(1, Math.floor(limit * fps));
  for (let i = 0; i < frameCount; i++) {
    const time = Math.min(i * interval, Math.max(0, limit - 0.001));
    await seekVideo(sourceMedia, time);
    frames.push(drawMediaToImageData(sourceMedia, width, height));
    if (i % 2 === 0) {
      const pct = Math.round((i / frameCount) * 100);
      setProgress(true, pct, "Video frame " + (i + 1) + "/" + frameCount);
      setStatus("Extracting video frame " + (i + 1) + "/" + frameCount + "...");
      await waitForFrame();
    }
  }
  setProgress(false);
  await seekVideo(sourceMedia, 0);
  drawSourcePreview(sourceMedia, width, height);
  return frames;
}

async function extractSourceFrames(width, height, fps, maxSeconds) {
  if (sourceKind === "gif") return extractGifFrames(width, height, fps, maxSeconds);
  if (sourceKind === "video") return extractVideoFrames(width, height, fps, maxSeconds);
  return [await getStaticFrame(width, height)];
}

function quantizeFrame(imageData, width, height, mode) {
  return els.dither.checked
    ? quantizeDither(imageData, width, height, mode)
    : quantizeNearest(imageData, width, height, mode);
}

async function loadSelectedFile(file) {
  if (!file) return;
  try {
    setProgress(true, 10, "Loading source...");
    setStatus("Loading source...");
    setFileSummary(file.name, "Loading " + formatBytes(file.size) + "...");
    sourceImage = null;
    sourceMedia = null;
    sourceFile = file;
    sourceFileName = file.name;
    sourceKind = detectSourceKind(file);
    updateDimensionLimits();
    clearGeneratedResult();
    els.sourceCanvas.hidden = true;
    els.sourceEmpty.hidden = false;
    els.sourceStage.classList.remove("has-canvas");
    setCanvasVisible(els.sourceCanvas, false);
    els.previewNote.textContent = "";
    if (sourceKind === "video") {
      sourceMedia = await loadVideoFromFile(file);
    } else {
      sourceImage = await loadImageFromFile(file);
      sourceMedia = sourceImage;
    }
    updateDimensionLimits();
    let detectedDuration = 0;
    if (sourceKind === "video") {
      detectedDuration = Number.isFinite(sourceMedia.duration) ? sourceMedia.duration : 0;
    } else if (sourceKind === "gif") {
      detectedDuration = await detectGifDurationSeconds(file);
    }
    if (detectedDuration > 0) {
      els.duration.value = Math.min(3600, detectedDuration).toFixed(detectedDuration < 10 ? 1 : 0);
    } else {
      els.duration.value = 0;
    }
    fitSize(128, 96);
    const { width, height } = normalizeDimensions();
    if (sourceKind === "video") await seekVideo(sourceMedia, 0);
    drawSourcePreview(sourceMedia, width, height);
    els.metricSize.textContent = width + " x " + height;
    els.previewNote.textContent = sourceNaturalWidth() + " x " + sourceNaturalHeight() + " " + sourceKind +
      (detectedDuration > 0 ? "  " + detectedDuration.toFixed(2) + "s" : "");
    setFileSummary(file.name, describeLoadedSource(file, detectedDuration));
    updateOutputName(selectedFormat());
    setProgress(false);
    setStatus("Loaded " + file.name, "good");
    showToast("Loaded " + file.name, "good");
    saveSettings();
  } catch (error) {
    sourceImage = null;
    sourceMedia = null;
    cleanupSourceVideoElement();
    cleanupSourceObjectUrl();
    updateDimensionLimits();
    setProgress(false);
    setFileSummary(file.name, (error.message || "Could not load source") + " | " + formatBytes(file.size));
    setStatus(error.message, "bad");
    showToast(error.message, "bad");
  }
}

async function handleFileChange() {
  await loadSelectedFile(els.file.files[0]);
}

async function convert() {
  if (!sourceMedia) {
    setStatus("Choose a source first", "bad");
    showToast("Choose a source first", "bad");
    return;
  }

  const { width, height } = normalizeDimensions();

  const format = selectedFormat();
  setStatus("Converting...");
  setProgress(true, 0, "Preparing...");

  await new Promise(resolve => requestAnimationFrame(resolve));

  try {
    const useLossy = lossyActive(format);
    const quality = compressionQuality();
    let generatedText = "";
    let actuallyUsedLossy = false;
    if (format.animated) {
      const fps = Math.round(clampNumber(els.fps.value, 1, 60, 10));
      const loop = Math.round(clampNumber(els.loop.value, 0, 65535, 0));
      const maxSeconds = clampNumber(els.duration.value, 0, 3600, 0);
      const delayMs = Math.max(1, Math.floor(1000 / fps));
      setProgress(true, 5, "Extracting frames...");
      const sourceFrames = await extractSourceFrames(width, height, fps, maxSeconds);
      if (!sourceFrames.length) throw new Error("No frames extracted");

      const losslessFrameIndices = [];
      const losslessPreviewFrames = [];
      const lossyFrameIndices = [];
      const lossyPreviewFrames = [];
      let previousLossyFrame = null;
      let totalChanged = 0;

      for (let i = 0; i < sourceFrames.length; i++) {
        const quantized = quantizeFrame(sourceFrames[i], width, height, format.mode);
        losslessFrameIndices.push(quantized.indices);
        losslessPreviewFrames.push(quantized.preview);

        if (useLossy) {
          const lossyResult = applyLossyCompression(quantized.indices, width, height, format.mode, previousLossyFrame, quality);
          lossyFrameIndices.push(lossyResult.indices);
          lossyPreviewFrames.push(previewFromIndices(lossyResult.indices, width, height, format.mode));
          previousLossyFrame = lossyResult.indices;
          totalChanged += lossyResult.changed;
        }

        if (i % 3 === 0) {
          const pct = Math.round(5 + (i / sourceFrames.length) * 90);
          setProgress(true, pct, "Encoding frame " + (i + 1) + "/" + sourceFrames.length);
          setStatus("Encoding frame " + (i + 1) + "/" + sourceFrames.length + (useLossy ? " lossy Q" + quality : "") + "...");
          await waitForFrame();
        }
      }

      const losslessOutput = buildNfpaOutput(losslessFrameIndices, width, height, format, delayMs, loop);
      let previewFrames, frameIndices;

      if (useLossy) {
        const lossyOutput = buildNfpaOutput(lossyFrameIndices, width, height, format, delayMs, loop);
        if (bytesOf(lossyOutput) < bytesOf(losslessOutput)) {
          generatedText = lossyOutput;
          previewFrames = lossyPreviewFrames;
          frameIndices = lossyFrameIndices;
          actuallyUsedLossy = true;
        } else {
          generatedText = losslessOutput;
          previewFrames = losslessPreviewFrames;
          frameIndices = losslessFrameIndices;
          actuallyUsedLossy = false;
        }
      } else {
        generatedText = losslessOutput;
        previewFrames = losslessPreviewFrames;
        frameIndices = losslessFrameIndices;
        actuallyUsedLossy = false;
      }

      els.output.value = generatedText;
      startResultAnimation(previewFrames, width, height, delayMs);
      updateMetrics(width, height, format.mode, generatedText, format, frameIndices.length);
    } else {
      const source = await getStaticFrame(width, height);
      const quantized = quantizeFrame(source, width, height, format.mode);
      const losslessOutput = buildOutput(quantized.indices, width, height, format);
      let preview;

      if (useLossy) {
        const lossyResult = applyLossyCompression(quantized.indices, width, height, format.mode, null, quality);
        const lossyOutput = buildOutput(lossyResult.indices, width, height, format);
        if (bytesOf(lossyOutput) < bytesOf(losslessOutput)) {
          generatedText = lossyOutput;
          preview = previewFromIndices(lossyResult.indices, width, height, format.mode);
          actuallyUsedLossy = true;
        } else {
          generatedText = losslessOutput;
          preview = quantized.preview;
          actuallyUsedLossy = false;
        }
      } else {
        generatedText = losslessOutput;
        preview = quantized.preview;
        actuallyUsedLossy = false;
      }

      els.output.value = generatedText;
      drawResultPreview(preview, width, height);
      updateMetrics(width, height, format.mode, generatedText, format);
    }

    outputText = generatedText;
    updateOutputName(format);
    els.copy.disabled = false;
    els.download.disabled = false;
    setProgress(false);
    const codecName = detectCodec(generatedText);
    const msg = "Converted " + outputFileName + (actuallyUsedLossy ? " lossy Q" + quality : "") + (codecName ? " " + codecName : "");
    setStatus(msg, "good");
    showToast(msg, "good");

    updateOutputName(format);
    els.copy.disabled = false;
    els.download.disabled = false;
    setProgress(false);
  } catch (error) {
    setProgress(false);
    setStatus(error.message || "Conversion failed", "bad");
    showToast(error.message || "Conversion failed", "bad");
  }
}

async function copyOutput() {
  const text = els.output.value;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    setStatus("Copied", "good");
    showToast("Copied to clipboard", "good");
  } catch (_) {
    els.output.focus();
    els.output.select();
    const ok = document.execCommand("copy");
    setStatus(ok ? "Copied" : "Copy failed", ok ? "good" : "bad");
    showToast(ok ? "Copied to clipboard" : "Copy failed", ok ? "good" : "bad");
  }
}

function downloadOutput() {
  const text = els.output.value;
  if (!text) return;
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = outputFileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(link.href), 500);
  setStatus("Downloaded " + outputFileName, "good");
  showToast("Downloaded " + outputFileName, "good");
}

function useDroppedFile(file) {
  if (!file) return;
  if (typeof DataTransfer === "function") {
    const transfer = new DataTransfer();
    transfer.items.add(file);
    els.file.files = transfer.files;
  }
  loadSelectedFile(file);
}

function resetAll() {
  sourceImage = null;
  sourceMedia = null;
  sourceFile = null;
  sourceFileName = "";
  sourceKind = "image";
  outputText = "";
  cleanupSourceVideoElement();
  cleanupSourceObjectUrl();
  clearGeneratedResult();
  els.sourceCanvas.hidden = true;
  els.sourceEmpty.hidden = false;
  els.sourceStage.classList.remove("has-canvas");
  setCanvasVisible(els.sourceCanvas, false);
  els.previewNote.textContent = "";
  setFileSummary("", "");
  setStatus("Ready");
  updateDimensionLimits();
  normalizeDimensions();
}

els.filePick.addEventListener("click", () => els.file.click());
els.file.addEventListener("change", handleFileChange);
els.fileDrop.addEventListener("dragover", event => {
  event.preventDefault();
  els.fileDrop.classList.add("drag");
});
els.fileDrop.addEventListener("dragleave", event => {
  if (!els.fileDrop.contains(event.relatedTarget)) els.fileDrop.classList.remove("drag");
});
els.fileDrop.addEventListener("drop", event => {
  event.preventDefault();
  els.fileDrop.classList.remove("drag");
  useDroppedFile(event.dataTransfer.files[0]);
});

window.addEventListener("dragover", event => {
  event.preventDefault();
  els.dragOverlay.classList.add("active");
});
window.addEventListener("dragleave", event => {
  if (!event.relatedTarget || event.relatedTarget === document.documentElement) {
    els.dragOverlay.classList.remove("active");
  }
});
window.addEventListener("drop", event => {
  event.preventDefault();
  els.dragOverlay.classList.remove("active");
  if (event.dataTransfer.files && event.dataTransfer.files[0]) {
    useDroppedFile(event.dataTransfer.files[0]);
  }
});

els.fit.addEventListener("click", () => {
  fitSize(128, 96);
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  }
});
els.convert.addEventListener("click", convert);
els.copy.addEventListener("click", copyOutput);
els.download.addEventListener("click", downloadOutput);
els.reset.addEventListener("click", resetAll);

document.addEventListener("keydown", event => {
  if (event.ctrlKey || event.metaKey) {
    if (event.key === "Enter") {
      event.preventDefault();
      convert();
    } else if (event.key.toLowerCase() === "s") {
      event.preventDefault();
      downloadOutput();
    } else if (event.key.toLowerCase() === "c") {
      if (document.activeElement !== els.output) {
        event.preventDefault();
        copyOutput();
      }
    } else if (event.key.toLowerCase() === "o") {
      event.preventDefault();
      els.file.click();
    }
  }
  if (event.key === "Escape") {
    if (els.dragOverlay.classList.contains("active")) {
      els.dragOverlay.classList.remove("active");
    } else if (!sourceMedia) {
      resetAll();
    }
  }
  if (event.key.toLowerCase() === "f" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    els.fit.click();
  }
});

els.width.addEventListener("input", () => {
  lastChangedSize = "width";
  syncRatio("width");
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  } else {
    normalizeDimensions();
  }
  saveSettings();
});
els.height.addEventListener("input", () => {
  lastChangedSize = "height";
  syncRatio("height");
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  } else {
    normalizeDimensions();
  }
  saveSettings();
});
els.ratio.addEventListener("change", () => {
  syncRatio(lastChangedSize);
  if (sourceMedia) {
    refreshSourcePreviewFromInputs();
    invalidateOutput("Size changed; convert again");
  }
  saveSettings();
});
els.dither.addEventListener("change", () => { invalidateOutput("Dither changed; convert again"); saveSettings(); });
els.compact.addEventListener("change", () => { invalidateOutput("Compression changed; convert again"); saveSettings(); });
els.fps.addEventListener("input", () => { invalidateOutput("Animation settings changed; convert again"); saveSettings(); });
els.loop.addEventListener("input", () => { invalidateOutput("Animation settings changed; convert again"); saveSettings(); });
els.duration.addEventListener("input", () => { invalidateOutput("Animation settings changed; convert again"); saveSettings(); });

for (const input of document.querySelectorAll("input[name='format']")) {
  input.addEventListener("change", () => {
    renderSwatches();
    invalidateOutput("Format changed; convert again");
    saveSettings();
  });
}

els.output.addEventListener("input", () => {
  outputText = els.output.value;
  const hasText = outputText.length > 0;
  els.copy.disabled = !hasText;
  els.download.disabled = !hasText;
  els.metricBytes.textContent = formatBytes(bytesOf(outputText));
});

updateDimensionLimits();
loadSettings();
renderSwatches();
document.querySelectorAll("input[name='compressionMode']").forEach(input => {
  input.addEventListener("change", () => {
    renderSwatches();
    clearGeneratedResult();
    saveSettings();
  });
});

els.quality.addEventListener("input", () => {
  renderSwatches();
  clearGeneratedResult();
  saveSettings();
});

els.compact.addEventListener("change", () => {
  renderSwatches();
});

document.querySelectorAll("input[name='codec']").forEach(input => {
  input.addEventListener("change", () => { invalidateOutput("Codec changed; convert again"); saveSettings(); });
});
</script>
</body>
</html>
